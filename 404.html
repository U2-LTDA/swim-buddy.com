<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buddy Swimmer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A1A2E;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #8ba4c0; margin-bottom: 2rem; }
    .buttons { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 280px; }
    a {
      display: block;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
    }
    .primary { background: #1A6FBF; color: #fff; }
    .secondary { background: #112240; color: #8ba4c0; border: 1px solid #1e3a5f; }
  </style>
</head>
<body>
  <img src="/icon.png" alt="Buddy Swimmer" onerror="this.style.display='none'" />
  <h1>Buddy Swimmer</h1>
  <p>Open the app to see this content.</p>
  <div class="buttons">
    <a class="secondary" href="/">Back to website</a>
  </div>
  <script>
    // Try to open the app via deep link before showing the page
    const path = window.location.pathname;
    window.location.href = "buddy-swimmer:/" + path;
  </script>
</body>
</html>
