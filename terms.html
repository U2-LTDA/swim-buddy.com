    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A1A2E; --bg2: #0E2240; --card: #112348;

      --fg: #E8F3FA; --muted: #7BA7BC; --border: #1E3A5F; --radius: 12px;

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--muted); font-size: 14px; font-weight: 500; }
    .nav-links a:hover { color: var(--fg); text-decoration: none; }

    .lang-switcher { position: relative; }
    .lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--fg); padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .lang-btn:hover { border-color: var(--primary); }
    .lang-dropdown { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow-y: auto; max-height: 60vh; min-width: 140px; z-index: 200; }
    .lang-dropdown.open { display: block; }
    .lang-option { display: block; width: 100%; padding: 10px 14px; font-size: 13px; color: var(--fg); background: none; border: none; text-align: left; cursor: pointer; }
    .lang-option:hover { background: var(--bg2); }
    .lang-option.active { color: var(--primary); font-weight: 600; }

    .legal-wrap { max-width: 720px; margin: 0 auto; padding: 56px 24px 100px; }
    .legal-back { display: inline-block; font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .legal-back:hover { color: var(--fg); }
    .legal-doc { white-space: pre-wrap; font-size: 15px; color: var(--fg); background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }
    .legal-switch { margin-top: 20px; font-size: 14px; color: var(--muted); }

    footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 40px 24px; text-align: center; margin-top: 40px; }
    .footer-logo { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .footer-links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
    .footer-links a { font-size: 13px; color: var(--muted); }
    .footer-links a:hover { color: var(--fg); text-decoration: none; }

    @media (max-width: 680px) { .nav-links { display: none; } }

<script>
const DOCS = {"en":"TERMS OF USE — SWIM BUDDY\n\nLast updated: 4 July 2026\n\n1. ACCEPTANCE\nBy creating an account, you confirm that you have read and accept these Terms of Use and our Privacy Policy.\n\n2. PURPOSE AND NATURE OF THE SERVICE\nSwim Buddy is a social network whose sole purpose is to connect people who practise open-water swimming. For the avoidance of doubt:\n- Swim Buddy does NOT organise, promote, host or supervise swims or events. Swim groups listed in the app are created and run entirely by the users themselves, on their own initiative and under their own responsibility. Swim Buddy merely provides the technological platform that allows users to connect with each other.\n- Swim Buddy is NOT a means of learning to swim. The app does not provide swimming lessons, instruction, training plans or coaching of any kind.\n- Swim Buddy is NOT a swimming school and has no instructors, lifeguards or supervisory staff. Nothing in the app constitutes professional, sporting or safety instruction.\n\n3. AGE REQUIREMENT\nSwim Buddy is intended for users aged 18 or over. By registering, you declare and warrant that you meet this requirement. Accounts found to belong to minors will be suspended or terminated.\n\n4. SWIMMING LEVEL REQUIREMENT\nSwim Buddy is designed for open-water swimmers with AT LEAST an advanced swimming level. By registering, you confirm that you meet this requirement. You are solely responsible for assessing whether any swim group is appropriate for your current skill level and physical condition.\n\n5. ASSUMPTION OF RISK\nOpen-water swimming involves inherent risks including but not limited to: drowning, hypothermia, marine wildlife, watercraft, and unexpected weather. By using this app and participating in swim groups, you acknowledge and voluntarily accept these risks.\n\n6. USER OBLIGATIONS\n- Provide accurate information about your swimming ability\n- Only join swim groups that match your skill level\n- Respect other participants and group organisers\n- Do not use the app for commercial purposes without prior written consent\n\n7. PRO PLAN (PAID SUBSCRIPTION)\nSwim Buddy offers an optional paid subscription (\"Pro plan\", monthly or yearly) that unlocks additional features and higher limits. The price is always shown in the app before purchase.\n- Billing and automatic renewal are processed by the App Store or Google Play under their own terms; we do not store your payment details.\n- You can cancel at any time in your store's subscription settings; cancellation takes effect at the end of the current billing period, with no pro-rata refund except where required by law or by the store's policy.\n- Violation of these Terms may result in suspension or termination of your account without refund of the period already paid.\n\n8. LIMITATION OF LIABILITY\nTo the maximum extent permitted by law, Swim Buddy and its operators shall not be liable for any injury, death, loss, or damage arising from participation in swim groups created by users and facilitated through the app.\n\n9. GOVERNING LAW\nThese Terms are governed by the laws of the European Union and the national laws of Portugal.\n\n10. CHANGES\nWe may update these Terms. You will be notified of material changes via the app. Continued use after notification constitutes acceptance.\n\n11. CONTACT\ncontact@swim-buddy.com","pt":"TERMOS DE USO — SWIM BUDDY\n\nÚltima atualização: 4 de julho de 2026\n\n1. ACEITAÇÃO\nAo criar uma conta, você confirma que leu e aceita estes Termos de Uso e a nossa Política de Privacidade.\n\n2. OBJETO E NATUREZA DO SERVIÇO\nA Swim Buddy é uma rede social cujo único objetivo é conectar pessoas que praticam natação em águas abertas. Para que não haja dúvida:\n- A Swim Buddy NÃO organiza, promove, realiza nem supervisiona nados ou eventos. Os grupos de nado exibidos no app são criados e conduzidos integralmente pelos próprios usuários, por iniciativa e sob responsabilidade deles. A Swim Buddy apenas fornece a plataforma tecnológica que permite a conexão entre os usuários.\n- A Swim Buddy NÃO é um meio de aprender a nadar. O app não oferece aulas de natação, instrução, planos de treino nem qualquer tipo de coaching.\n- A Swim Buddy NÃO é uma escola de natação e não possui instrutores, salva-vidas ou equipe de supervisão. Nada no app constitui instrução profissional, esportiva ou de segurança.\n\n3. REQUISITO DE IDADE\nA Swim Buddy é destinada a usuários com 18 anos ou mais. Ao se cadastrar, você declara e garante ter essa idade. Contas identificadas como pertencentes a menores serão suspensas ou encerradas.\n\n4. EXIGÊNCIA DE NÍVEL DE NATAÇÃO\nA Swim Buddy foi feita para nadadores de águas abertas com NO MÍNIMO nível avançado. Ao se cadastrar, você confirma que atende a esse requisito. Você é o único responsável por avaliar se um grupo de nado é adequado ao seu nível atual de habilidade e à sua condição física.\n\n5. ASSUNÇÃO DE RISCO\nA natação em águas abertas envolve riscos inerentes, incluindo, entre outros: afogamento, hipotermia, vida marinha, embarcações e condições climáticas inesperadas. Ao usar este app e participar de grupos de nado, você reconhece e aceita voluntariamente esses riscos.\n\n6. OBRIGAÇÕES DO USUÁRIO\n- Fornecer informações precisas sobre sua capacidade de natação\n- Entrar apenas em grupos compatíveis com o seu nível\n- Respeitar os demais participantes e os organizadores dos grupos\n- Não usar o app para fins comerciais sem autorização prévia por escrito\n\n7. PLANO PRO (ASSINATURA PAGA)\nA Swim Buddy oferece uma assinatura paga opcional (\"plano Pro\", mensal ou anual) que desbloqueia recursos adicionais e limites maiores. O preço é sempre exibido no app antes da compra.\n- A cobrança e a renovação automática são processadas pela App Store ou pelo Google Play, conforme os termos das próprias lojas; não armazenamos seus dados de pagamento.\n- Você pode cancelar a qualquer momento nas configurações de assinatura da loja; o cancelamento tem efeito ao final do período vigente, sem reembolso proporcional, salvo quando exigido por lei ou pela política da loja.\n- A violação destes Termos pode acarretar suspensão ou encerramento da conta, sem reembolso do período já pago.\n\n8. LIMITAÇÃO DE RESPONSABILIDADE\nNa máxima extensão permitida por lei, a Swim Buddy e seus operadores não serão responsáveis por qualquer lesão, morte, perda ou dano decorrente da participação em grupos de nado criados pelos usuários e facilitados por meio do app.\n\n9. LEI APLICÁVEL E FORO\nPara usuários residentes no Brasil, estes Termos são regidos pela legislação brasileira — em especial o Código Civil, o Código de Defesa do Consumidor, o Marco Civil da Internet (Lei nº 12.965/2014) e a Lei Geral de Proteção de Dados (Lei nº 13.709/2018) — ficando eleito o foro do domicílio do consumidor para dirimir controvérsias. Para os demais usuários, estes Termos são regidos pelas leis da União Europeia e pela legislação nacional de Portugal.\n\n10. ALTERAÇÕES\nPodemos atualizar estes Termos. Você será notificado sobre mudanças relevantes pelo app. O uso continuado após a notificação constitui aceitação.\n\n11. CONTATO\ncontact@swim-buddy.com","es":"TÉRMINOS DE SERVICIO — SWIM BUDDY\n\nÚltima actualización: 4 de julio de 2026\n\n1. ACEPTACIÓN\nAl crear una cuenta, confirma que ha leído y acepta estos Términos de Servicio y nuestra Política de Privacidad.\n\n2. OBJETIVO Y NATURALEZA DEL SERVICIO\nSwim Buddy es una red social cuyo único propósito es conectar a las personas que practican natación en aguas abiertas. Para evitar confusiones:\n- Swim Buddy NO organiza, promueve, alberga ni supervisa nados ni eventos. Los grupos de nado enumerados en la aplicación son creados y operados enteramente por los usuarios mismos, por su propia iniciativa y bajo su propia responsabilidad. Swim Buddy simplemente proporciona la plataforma tecnológica que permite a los usuarios conectarse entre sí.\n- Swim Buddy NO es un medio para aprender a nadar. La aplicación no proporciona lecciones de natación, instrucción, planes de entrenamiento ni coaching.\n- Swim Buddy NO es una escuela de natación y no tiene instructores, socorristas ni personal de supervisión. Nada en la aplicación constituye instrucción profesional, deportiva o de seguridad.\n\n3. REQUISITO DE EDAD\nSwim Buddy está destinado a usuarios de 18 años o más. Al registrarte, declaras y garantizas que cumples con este requisito. Las cuentas que se determine que pertenecen a menores serán suspendidas o cerradas.\n\n4. REQUISITO DE NIVEL DE NATACIÓN\nSwim Buddy está diseñado para nadadores en aguas abiertas con AL MENOS un nivel de natación avanzado. Al registrarse, confirma que cumple con este requisito. Usted es el único responsable de evaluar si un grupo de nado es apropiado para su nivel actual de habilidad y condición física.\n\n5. ASUNCIÓN DE RIESGO\nLa natación en aguas abiertas implica riesgos inherentes incluyendo, pero no limitado a: ahogamiento, hipotermia, vida marina, embarcaciones y clima impredecible. Al usar esta aplicación y participar en grupos de nado, reconoce y acepta voluntariamente estos riesgos.\n\n6. OBLIGACIONES DEL USUARIO\n- Proporcionar información precisa sobre su capacidad de natación\n- Solo unirse a grupos de nado que correspondan a su nivel\n- Respetar a otros participantes y organizadores de grupos\n- No usar la aplicación para fines comerciales sin consentimiento previo por escrito\n\n7. PLAN PRO (SUSCRIPCIÓN DE PAGO)\nSwim Buddy ofrece una suscripción de pago opcional (\"plan Pro\", mensual o anual) que desbloquea funciones adicionales y límites más altos. El precio siempre se muestra en la aplicación antes de la compra.\n- La facturación y la renovación automática son procesadas por la App Store o Google Play según sus propios términos; no almacenamos sus datos de pago.\n- Puede cancelar en cualquier momento en la configuración de suscripciones de su tienda; la cancelación surte efecto al final del período de facturación vigente, sin reembolso proporcional, salvo cuando lo exija la ley o la política de la tienda.\n- La violación de estos Términos puede resultar en la suspensión o cierre de su cuenta, sin reembolso del período ya pagado.\n\n8. LIMITACIÓN DE RESPONSABILIDAD\nEn la máxima medida permitida por la ley, Swim Buddy y sus operadores no serán responsables de ninguna lesión, muerte, pérdida o daño derivado de la participación en grupos de nado creados por usuarios y facilitados a través de la aplicación.\n\n9. LEY APLICABLE\nEstos Términos se rigen por las leyes de la Unión Europea y la legislación nacional de Portugal.\n\n10. CAMBIOS\nPodemos actualizar estos Términos. Se le notificarán cambios materiales a través de la aplicación. El uso continuado después de la notificación constituye aceptación.\n\n11. CONTACTO\ncontact@swim-buddy.com","de":"NUTZUNGSBEDINGUNGEN — SWIM BUDDY\n\nZuletzt aktualisiert: 4. Juli 2026\n\n1. AKZEPTANZ\nDurch die Kontoerstellung bestätigen Sie, dass Sie diese Nutzungsbedingungen und unsere Datenschutzrichtlinie gelesen haben und akzeptieren.\n\n2. ZWECK UND ART DES DIENSTES\nSwim Buddy ist ein soziales Netzwerk, dessen einziger Zweck darin besteht, Menschen zu verbinden, die Freiwasserschwimmen praktizieren. Um Missverständnisse zu vermeiden:\n- Swim Buddy organisiert, bewirbt, veranstaltet oder beaufsichtigt KEINE Schwimmen oder Veranstaltungen. Schwimmgruppen in der App werden vollständig von den Benutzern selbst auf eigene Initiative und auf eigene Verantwortung hin erstellt und geleitet. Swim Buddy stellt lediglich die technologische Plattform zur Verfügung, die es Benutzern ermöglicht, sich untereinander zu verbinden.\n- Swim Buddy ist KEIN Mittel zum Erlernen des Schwimmens. Die App bietet keinen Unterricht, keine Anleitung, keine Trainingspläne oder Coaching.\n- Swim Buddy ist KEINE Schwimmschule und hat keine Trainer, Rettungsschwimmer oder Aufsichtspersonal. Nichts in der App stellt professionelle, sportliche oder Sicherheitsanleitung dar.\n\n3. ALTERSANFORDERUNG\nSwim Buddy richtet sich an Nutzer ab 18 Jahren. Mit der Registrierung erklären und versichern Sie, dass Sie diese Anforderung erfüllen. Konten, die Minderjährigen gehören, werden gesperrt oder gekündigt.\n\n4. ANFORDERUNG AN DAS SCHWIMMNIVEAU\nSwim Buddy ist für Freiwasserschwimmer mit MINDESTENS fortgeschrittenem Schwimmniveau ausgelegt. Durch die Registrierung bestätigen Sie, dass Sie diese Anforderung erfüllen. Sie sind allein verantwortlich für die Beurteilung, ob eine Schwimmgruppe für Ihr derzeitiges Schwimmniveau und Ihren Gesundheitszustand geeignet ist.\n\n5. RISIKOÜBERNAHME\nFreiwasserschwimmen birgt inhärente Risiken, einschließlich, aber nicht begrenzt auf: Ertrinken, Unterkühlung, Meereslebewesen, Wasserfahrzeuge und unerwartetes Wetter. Durch die Nutzung dieser App und die Teilnahme an Schwimmgruppen erkennen Sie diese Risiken an und akzeptieren sie freiwillig.\n\n6. VERPFLICHTUNGEN DES BENUTZERS\n- Geben Sie genaue Informationen über Ihre Schwimmfähigkeiten an\n- Treten Sie nur Schwimmgruppen bei, die Ihrem Schwimmniveau entsprechen\n- Respektieren Sie andere Teilnehmer und Gruppenleiter\n- Verwenden Sie die App nicht für kommerzielle Zwecke ohne vorherige schriftliche Genehmigung\n\n7. PRO-PLAN (KOSTENPFLICHTIGES ABONNEMENT)\nSwim Buddy bietet ein optionales kostenpflichtiges Abonnement (\"Pro-Plan\", monatlich oder jährlich), das zusätzliche Funktionen und höhere Limits freischaltet. Der Preis wird vor dem Kauf stets in der App angezeigt.\n- Abrechnung und automatische Verlängerung werden vom App Store oder Google Play gemäß deren Bedingungen abgewickelt; wir speichern keine Zahlungsdaten.\n- Sie können jederzeit in den Abonnement-Einstellungen Ihres Stores kündigen; die Kündigung wird zum Ende des laufenden Abrechnungszeitraums wirksam, ohne anteilige Erstattung, sofern nicht gesetzlich oder durch die Store-Richtlinien vorgeschrieben.\n- Verstöße gegen diese Bedingungen können zur Sperrung oder Kündigung Ihres Kontos führen, ohne Erstattung des bereits bezahlten Zeitraums.\n\n8. HAFTUNGSBESCHRÄNKUNG\nSoweit durch Gesetze zulässig, haften Swim Buddy und seine Betreiber nicht für Verletzungen, Todesfälle, Verluste oder Schäden, die sich aus der Teilnahme an von Benutzern erstellten und über die App ermöglichten Schwimmgruppen ergeben.\n\n9. ANWENDBARES RECHT\nDiese Bedingungen unterliegen den Gesetzen der Europäischen Union und der nationalen Gesetze Portugals.\n\n10. ÄNDERUNGEN\nWir können diese Bedingungen aktualisieren. Sie werden über wesentliche Änderungen in der App benachrichtigt. Die fortgesetzte Nutzung nach der Benachrichtigung gilt als Akzeptanz.\n\n11. KONTAKT\ncontact@swim-buddy.com","fr":"CONDITIONS D'UTILISATION — SWIM BUDDY\n\nDernière mise à jour : 4 juillet 2026\n\n1. ACCEPTATION\nEn créant un compte, vous confirmez que vous avez lu et acceptez ces Conditions d'Utilisation et notre Politique de Confidentialité.\n\n2. OBJECTIF ET NATURE DU SERVICE\nSwim Buddy est un réseau social dont l'unique objectif est de connecter les personnes qui pratiquent la natation en eau libre. Pour éviter tout doute :\n- Swim Buddy N'organise PAS, ne promeut PAS, n'accueille PAS et ne supervise PAS les nages ou événements. Les groupes de nage répertoriés dans l'application sont créés et gérés entièrement par les utilisateurs eux-mêmes, de leur propre initiative et sous leur propre responsabilité. Swim Buddy fournit simplement la plateforme technologique qui permet aux utilisateurs de se connecter les uns aux autres.\n- Swim Buddy N'est PAS un moyen d'apprendre à nager. L'application ne propose pas de leçons de natation, d'instructions, de plans d'entraînement ni de coaching.\n- Swim Buddy N'est PAS une école de natation et ne dispose pas d'instructeurs, de maîtres-nageurs ou de personnel de surveillance. Rien dans l'application ne constitue une instruction professionnelle, sportive ou de sécurité.\n\n3. EXIGENCE D'ÂGE\nSwim Buddy s'adresse aux utilisateurs âgés de 18 ans ou plus. En vous inscrivant, vous déclarez et garantissez que vous remplissez cette condition. Les comptes appartenant à des mineurs seront suspendus ou résiliés.\n\n4. EXIGENCE DE NIVEAU DE NATATION\nSwim Buddy est conçu pour les nageurs en eau libre ayant AU MINIMUM un niveau de natation avancé. En vous inscrivant, vous confirmez que vous répondez à cette exigence. Vous êtes seul responsable de l'évaluation de l'opportunité de rejoindre un groupe de nage pour votre niveau de compétence actuel et votre condition physique.\n\n5. ACCEPTATION DES RISQUES\nLa natation en eau libre comporte des risques inhérents, notamment, mais sans s'y limiter : la noyade, l'hypothermie, la faune marine, les embarcations et les conditions météorologiques imprévisibles. En utilisant cette application et en participant à des groupes de nage, vous reconnaissez et acceptez volontairement ces risques.\n\n6. OBLIGATIONS DE L'UTILISATEUR\n- Fournir des informations précises sur votre capacité de natation\n- Ne rejoindre que des groupes de nage qui correspondent à votre niveau\n- Respecter les autres participants et les organisateurs de groupes\n- Ne pas utiliser l'application à des fins commerciales sans consentement écrit préalable\n\n7. PLAN PRO (ABONNEMENT PAYANT)\nSwim Buddy propose un abonnement payant facultatif (« plan Pro », mensuel ou annuel) qui débloque des fonctionnalités supplémentaires et des limites plus élevées. Le prix est toujours affiché dans l'application avant l'achat.\n- La facturation et le renouvellement automatique sont traités par l'App Store ou Google Play selon leurs propres conditions ; nous ne stockons pas vos données de paiement.\n- Vous pouvez annuler à tout moment dans les paramètres d'abonnement de votre boutique ; l'annulation prend effet à la fin de la période de facturation en cours, sans remboursement au prorata, sauf si la loi ou la politique de la boutique l'exige.\n- La violation de ces Conditions peut entraîner la suspension ou la résiliation de votre compte, sans remboursement de la période déjà payée.\n\n8. LIMITATION DE RESPONSABILITÉ\nDans la mesure maximale autorisée par la loi, Swim Buddy et ses opérateurs ne seront pas responsables de toute blessure, décès, perte ou dommage résultant de la participation à des groupes de nage créés par les utilisateurs et facilités par l'application.\n\n9. LOI APPLICABLE\nCes Conditions sont régies par les lois de l'Union européenne et la législation nationale du Portugal.\n\n10. MODIFICATIONS\nNous pouvons mettre à jour ces Conditions. Vous serez notifié des modifications importantes via l'application. L'utilisation continue après notification constitue une acceptation.\n\n11. CONTACT\ncontact@swim-buddy.com","it":"TERMINI DI UTILIZZO — SWIM BUDDY\n\nUltimo aggiornamento: 4 luglio 2026\n\n1. ACCETTAZIONE\nCreando un account, confermi di aver letto e accettato questi Termini di Utilizzo e la nostra Informativa sulla Privacy.\n\n2. SCOPO E NATURA DEL SERVIZIO\nSwim Buddy è un social network il cui unico scopo è collegare le persone che praticano il nuoto in acqua libera. Per evitare fraintendimenti:\n- Swim Buddy NON organizza, promuove, ospita o supervisiona nuotate o eventi. I gruppi di nuoto elencati nell'app sono creati e gestiti interamente dagli utenti stessi, di loro iniziativa e sotto la loro responsabilità. Swim Buddy fornisce semplicemente la piattaforma tecnologica che consente agli utenti di connettersi tra loro.\n- Swim Buddy NON è un mezzo per imparare a nuotare. L'app non fornisce lezioni di nuoto, istruzioni, piani di allenamento o coaching.\n- Swim Buddy NON è una scuola di nuoto e non ha istruttori, bagnini o personale di supervisione. Nulla nell'app costituisce istruzioni professionali, sportive o di sicurezza.\n\n3. REQUISITO DI ETÀ\nSwim Buddy è destinato a utenti di età pari o superiore a 18 anni. Registrandoti, dichiari e garantisci di soddisfare questo requisito. Gli account risultati appartenere a minorenni saranno sospesi o chiusi.\n\n4. REQUISITO DI LIVELLO DI NUOTO\nSwim Buddy è progettato per nuotatori in acqua libera con ALMENO un livello di nuoto avanzato. Registrandoti, confermi di soddisfare questo requisito. Sei l'unico responsabile della valutazione dell'opportunità di un gruppo di nuoto per il tuo attuale livello di abilità e condizione fisica.\n\n5. ASSUNZIONE DI RISCHIO\nIl nuoto in acqua libera comporta rischi intrinseci, inclusi ma non limitati a: annegamento, ipotermia, fauna marina, imbarcazioni e condizioni meteorologiche inaspettate. Utilizzando questa app e partecipando ai gruppi di nuoto, riconosci e accetti volontariamente questi rischi.\n\n6. OBBLIGHI DELL'UTENTE\n- Fornire informazioni accurate sulla tua capacità di nuoto\n- Unirsi solo a gruppi di nuoto che corrispondono al tuo livello\n- Rispettare gli altri partecipanti e gli organizzatori dei gruppi\n- Non utilizzare l'app per scopi commerciali senza preventivo consenso scritto\n\n7. PIANO PRO (ABBONAMENTO A PAGAMENTO)\nSwim Buddy offre un abbonamento a pagamento facoltativo (\"piano Pro\", mensile o annuale) che sblocca funzionalità aggiuntive e limiti più elevati. Il prezzo è sempre mostrato nell'app prima dell'acquisto.\n- La fatturazione e il rinnovo automatico sono gestiti dall'App Store o da Google Play secondo i loro termini; non memorizziamo i tuoi dati di pagamento.\n- Puoi annullare in qualsiasi momento nelle impostazioni degli abbonamenti dello store; l'annullamento ha effetto alla fine del periodo di fatturazione in corso, senza rimborso proporzionale, salvo quando richiesto dalla legge o dalla politica dello store.\n- La violazione di questi Termini può comportare la sospensione o la chiusura dell'account, senza rimborso del periodo già pagato.\n\n8. LIMITAZIONE DI RESPONSABILITÀ\nNella massima misura consentita dalla legge, Swim Buddy e i suoi operatori non saranno responsabili per lesioni, morte, perdite o danni derivanti dalla partecipazione a gruppi di nuoto creati dagli utenti e facilitati tramite l'app.\n\n9. LEGGE APPLICABILE\nQuesti Termini sono disciplinati dalle leggi dell'Unione europea e dalla legislazione nazionale del Portogallo.\n\n10. MODIFICHE\nPossiamo aggiornare questi Termini. Sarai notificato di modifiche sostanziali tramite l'app. L'uso continuato dopo la notifica costituisce accettazione.\n\n11. CONTATTO\ncontact@swim-buddy.com","hu":"FELHASZNÁLÁSI FELTÉTELEK — SWIM BUDDY\n\nUtolsó frissítés: 2026. július 4.\n\n1. ELFOGADÁS\nFiók létrehozásával megerősíti, hogy elolvasta és elfogadja ezeket a Felhasználási Feltételeket és az Adatvédelmi Nyilatkozatunkat.\n\n2. A SZOLGÁLTATÁS CÉLJA ÉS JELLEGE\nA Swim Buddy olyan közösségi hálózat, amelynek egyetlen célja az úszó emberek összekapcsolása. Az érthetőség kedvéért:\n- A Swim Buddy NEM szervez, NEM promót, NEM szállít és NEM felügyeli az úszásokat vagy eseményeket. Az alkalmazásban felsorolt úszócsoportokat teljes egészében maguk a felhasználók hozzák létre és üzemeltetik, saját kezdeményezésükből és saját felelősségükre. A Swim Buddy csupán a technológiai platformot biztosítja, amely lehetővé teszi a felhasználók egymáshoz való csatlakozását.\n- A Swim Buddy NEM az úszás tanulásának eszköze. Az alkalmazás nem nyújt úszásórákat, utasításokat, edzésterveket vagy edzést.\n- A Swim Buddy NEM úszóiskola, és nincs oktatói, mentőségei vagy felügyeleti személyzete. Az alkalmazásban szereplő semmi nem minősül professzionális, sportági vagy biztonsági utasításnak.\n\n3. ÉLETKORI KÖVETELMÉNY\nA Swim Buddy 18 éves vagy annál idősebb felhasználók számára készült. A regisztrációval kijelenti és szavatolja, hogy megfelel ennek a követelménynek. A kiskorúak tulajdonában lévőnek talált fiókokat felfüggesztjük vagy megszüntetjük.\n\n4. ÚSZÁSI SZINT KÖVETELMÉNY\nA Swim Buddy olyan úszócsoportoknak készült, akik LEGALÁBB haladó úszási szinttel rendelkeznek. Regisztrációval megerősíti, hogy teljesíti ezt a követelményt. Kizárólagosan Ön felelős annak megítéléséért, hogy egy úszócsoport megfelelő-e az Ön jelenlegi képzettségi szintjéhez és fizikai állapotához.\n\n5. KOCKÁZAT ELFOGADÁSA\nA nyílt vízben úszás inherens kockázatokkal jár, beleértve, de nem kizárólagosan: fulladt, hypothermia, tengeri élőlények, vízi járművek és váratlan időjárás. Az alkalmazás használatával és az úszócsoportokban való részvétellel Ön elismeri és önként elfogadja ezeket a kockázatokat.\n\n6. FELHASZNÁLÓI KÖTELEZETTSÉGEK\n- Pontos információk nyújtása az úszási képességéről\n- Csak az Ön szintjének megfelelő úszócsoportokhoz csatlakozzon\n- Tisztelje az egyéb résztvevőket és a csoportvezetőket\n- Ne használja az alkalmazást kereskedelmi célokra előzetes írásbeli hozzájárulás nélkül\n\n7. PRO CSOMAG (FIZETŐS ELŐFIZETÉS)\nA Swim Buddy opcionális fizetős előfizetést kínál (\"Pro csomag\", havi vagy éves), amely további funkciókat és magasabb limiteket old fel. Az ár a vásárlás előtt mindig megjelenik az alkalmazásban.\n- A számlázást és az automatikus megújítást az App Store vagy a Google Play kezeli a saját feltételeik szerint; fizetési adatait nem tároljuk.\n- Bármikor lemondhat az áruház előfizetési beállításaiban; a lemondás az aktuális számlázási időszak végén lép hatályba, arányos visszatérítés nélkül, kivéve, ha azt törvény vagy az áruház szabályzata előírja.\n- A jelen Feltételek megsértése a fiók felfüggesztését vagy megszüntetését eredményezheti, a már kifizetett időszak visszatérítése nélkül.\n\n8. FELELŐSSÉG KORLÁTOZÁSA\nA jogszabályok által megengedett mértékben a Swim Buddy és üzemeltetői nem felelősek a felhasználók által létrehozott és az alkalmazáson keresztül megkönnyített úszócsoportokban való részvételből eredő sérülésekért, haláleset, veszteségért vagy kárért.\n\n9. ALKALMAZANDÓ JOG\nEzeket a Feltételeket az Európai Unió törvényei és Portugália nemzeti jogszabályai irányítják.\n\n10. MÓDOSÍTÁSOK\nEzeket a Feltételeket frissíthetjük. Az alkalmazáson keresztül értesítjük az alapvető módosításokról. A folytatott használat az értesítés után elfogadásnak minősül.\n\n11. KAPCSOLAT\ncontact@swim-buddy.com","zh":"使用条款 — SWIM BUDDY\n\n最后更新：2026年7月4日\n\n1. 接受\n通过创建账户，您确认已阅读并接受这些使用条款和我们的隐私政策。\n\n2. 服务目的和性质\nSwim Buddy是一个社交网络，其唯一目的是连接从事开放水域游泳的人。为了避免歧义：\n- Swim Buddy不组织、推广、举办或监督游泳或活动。应用中列出的游泳小组完全由用户自己创建和运营，出于他们自己的主动性和在他们自己的责任下。Swim Buddy仅提供允许用户相互连接的技术平台。\n- Swim Buddy不是学习游泳的手段。该应用不提供游泳课程、教学、训练计划或任何形式的培训。\n- Swim Buddy不是游泳学校，没有教练、救生员或监督人员。应用中的任何内容都不构成专业、体育或安全指导。\n\n3. 年龄要求\nSwim Buddy面向年满18周岁的用户。注册即表示您声明并保证符合此要求。经查实属于未成年人的账户将被暂停或关闭。\n\n4. 游泳水平要求\nSwim Buddy是为至少具有高级游泳水平的开放水域游泳者设计的。通过注册，您确认您符合此要求。您是唯一负责评估任何游泳小组是否适合您当前技能水平和身体状况的人。\n\n5. 风险承担\n开放水域游泳涉及固有风险，包括但不仅限于：溺水、低体温、海洋生物、船只和不可预见的天气。通过使用此应用并参加游泳小组，您承认并自愿接受这些风险。\n\n6. 用户义务\n- 提供关于您游泳能力的准确信息\n- 仅加入与您技能水平相符的游泳小组\n- 尊重其他参与者和小组组织者\n- 未经事先书面同意，不得将应用用于商业目的\n\n7. PRO计划（付费订阅）\nSwim Buddy提供可选的付费订阅（\"Pro计划\"，按月或按年），解锁额外功能和更高限额。价格在购买前始终显示在应用中。\n- 计费和自动续订由App Store或Google Play根据其条款处理；我们不存储您的付款信息。\n- 您可以随时在商店的订阅设置中取消；取消在当前计费周期结束时生效，除法律或商店政策要求外，不提供按比例退款。\n- 违反这些条款可能导致账户暂停或终止，已支付期间不予退款。\n\n8. 责任限制\n在法律允许的最大范围内，Swim Buddy及其运营者不对因参与由用户创建并通过应用便利的游泳小组而产生的任何伤害、死亡、损失或损害承担责任。\n\n9. 适用法律\n这些条款受欧盟法律和葡萄牙国家法律管辖。\n\n10. 更改\n我们可能会更新这些条款。我们将通过应用通知您有关重大更改。继续使用后表示接受。\n\n11. 联系方式\ncontact@swim-buddy.com","hi":"उपयोग की शर्तें — SWIM BUDDY\n\nअंतिम अद्यतन: 4 जुलाई 2026\n\n1. स्वीकृति\nखाता बनाकर, आप पुष्टि करते हैं कि आपने इन शर्तों और हमारी गोपनीयता नीति को पढ़ लिया है और स्वीकार किया है।\n\n2. सेवा का उद्देश्य और प्रकृति\nSwim Buddy एक सामाजिक नेटवर्क है जिसका एकमात्र उद्देश्य खुले पानी में तैराकी करने वाले लोगों को जोड़ना है। संदेह से बचने के लिए:\n- Swim Buddy तैराकी या आयोजन को संगठित, प्रचारित, होस्ट या निरीक्षण नहीं करता है। ऐप में सूचीबद्ध तैराकी समूह पूरी तरह से उपयोगकर्ताओं द्वारा अपने स्वयं के प्रयास और अपनी जिम्मेदारी के तहत बनाए और संचालित किए जाते हैं। Swim Buddy केवल तकनीकी मंच प्रदान करता है जो उपयोगकर्ताओं को एक दूसरे से जुड़ने की अनुमति देता है।\n- Swim Buddy तैराकी सीखने का साधन नहीं है। ऐप कोई तैराकी पाठ, निर्देश, प्रशिक्षण योजना या किसी भी प्रकार की कोचिंग प्रदान नहीं करता है।\n- Swim Buddy एक तैराकी स्कूल नहीं है और इसके पास कोई प्रशिक्षक, लाइफगार्ड या निरीक्षण कर्मचारी नहीं है। ऐप में कुछ भी पेशेवर, खेल या सुरक्षा निर्देश का गठन नहीं करता है।\n\n3. आयु आवश्यकता\nSwim Buddy 18 वर्ष या उससे अधिक आयु के उपयोगकर्ताओं के लिए है। पंजीकरण करके, आप घोषणा करते हैं और गारंटी देते हैं कि आप इस आवश्यकता को पूरा करते हैं। नाबालिगों से संबंधित पाए गए खातों को निलंबित या समाप्त कर दिया जाएगा।\n\n4. तैराकी स्तर की आवश्यकता\nSwim Buddy उन्नत तैराकी स्तर वाले खुले पानी के तैराकों के लिए डिज़ाइन किया गया है। पंजीकरण करके, आप पुष्टि करते हैं कि आप इस आवश्यकता को पूरा करते हैं। आप अकेले ही यह आकलन करने के लिए जिम्मेदार हैं कि क्या कोई तैराकी समूह आपके वर्तमान कौशल स्तर और शारीरिक स्थिति के लिए उपयुक्त है।\n\n5. जोखिम की स्वीकृति\nखुले पानी में तैराकी में अंतर्निहित जोखिम शामिल हैं जिनमें शामिल हैं लेकिन सीमित नहीं हैं: डूबना, हाइपोथर्मिया, समुद्री जीवन, जलयान और अप्रत्याशित मौसम। इस ऐप का उपयोग करके और तैराकी समूहों में भाग लेकर, आप इन जोखिमों को स्वीकार करते हैं और स्वेच्छा से स्वीकार करते हैं।\n\n6. उपयोगकर्ता के दायित्व\n- अपनी तैराकी क्षमता के बारे में सटीक जानकारी प्रदान करें\n- केवल अपने कौशल स्तर से मेल खाने वाले तैराकी समूहों में शामिल हों\n- अन्य प्रतिभागियों और समूह आयोजकों का सम्मान करें\n- पूर्व लिखित सहमति के बिना वाणिज्यिक उद्देश्यों के लिए ऐप का उपयोग न करें\n\n7. PRO योजना (सशुल्क सदस्यता)\nSwim Buddy एक वैकल्पिक सशुल्क सदस्यता (\"Pro योजना\", मासिक या वार्षिक) प्रदान करता है जो अतिरिक्त सुविधाएं और उच्च सीमाएं अनलॉक करती है। खरीद से पहले कीमत हमेशा ऐप में दिखाई जाती है।\n- बिलिंग और स्वचालित नवीनीकरण App Store या Google Play द्वारा उनकी शर्तों के अनुसार संसाधित किए जाते हैं; हम आपके भुगतान विवरण संग्रहीत नहीं करते।\n- आप किसी भी समय अपने स्टोर की सदस्यता सेटिंग्स में रद्द कर सकते हैं; रद्दीकरण वर्तमान बिलिंग अवधि के अंत में प्रभावी होता है, आनुपातिक धनवापसी के बिना, सिवाय जब कानून या स्टोर की नीति द्वारा आवश्यक हो।\n- इन शर्तों का उल्लंघन खाते के निलंबन या समाप्ति का कारण बन सकता है, पहले से भुगतान की गई अवधि की धनवापसी के बिना।\n\n8. दायित्व की सीमा\nकानून द्वारा अनुमति के अधिकतम हद तक, Swim Buddy और इसके ऑपरेटर उपयोगकर्ताओं द्वारा बनाए गए और ऐप के माध्यम से सुविधाजनक तैराकी समूहों में भाग लेने से उत्पन्न किसी भी चोट, मृत्यु, नुकसान या क्षति के लिए जिम्मेदार नहीं होंगे।\n\n9. लागू कानून\nये शर्तें यूरोपीय संघ के कानूनों और पुर्तगाल के राष्ट्रीय कानूनों द्वारा शासित होती हैं।\n\n10. परिवर्तन\nहम इन शर्तों को अपडेट कर सकते हैं। हम ऐप के माध्यम से महत्वपूर्ण परिवर्तनों के बारे में आपको सूचित करेंगे। सूचना के बाद निरंतर उपयोग स्वीकृति का गठन करता है।\n\n11. संपर्क\ncontact@swim-buddy.com","bn":"ব্যবহারের শর্তাবলী — SWIM BUDDY\n\nসর্বশেষ আপডেট: 4 জুলাই 2026\n\n1. গ্রহণ\nঅ্যাকাউন্ট তৈরি করে, আপনি নিশ্চিত করেন যে আপনি এই শর্তাবলী এবং আমাদের গোপনীয়তা নীতি পড়েছেন এবং গ্রহণ করেছেন।\n\n2. সেবার উদ্দেশ্য এবং প্রকৃতি\nSwim Buddy একটি সামাজিক নেটওয়ার্ক যার একমাত্র উদ্দেশ্য খোলা জলে সাঁতার কাটা মানুষদের সংযুক্ত করা। অস্পষ্টতা এড়ানোর জন্য:\n- Swim Buddy সাঁতার বা ইভেন্ট আয়োজন, প্রচার, হোস্ট বা তদারকি করে না। অ্যাপে তালিকাভুক্ত সাঁতারের গ্রুপগুলি সম্পূর্ণভাবে ব্যবহারকারীদের দ্বারা তাদের নিজস্ব উদ্যোগ এবং তাদের নিজস্ব দায়বদ্ধতার অধীনে তৈরি এবং পরিচালিত হয়। Swim Buddy কেবল প্রযুক্তিগত প্ল্যাটফর্ম সরবরাহ করে যা ব্যবহারকারীদের একে অপরের সাথে সংযুক্ত হতে দেয়।\n- Swim Buddy সাঁতার শেখার একটি মাধ্যম নয়। অ্যাপটি কোনও সাঁতারের পাঠ, নির্দেশ, প্রশিক্ষণ পরিকল্পনা বা কোনও ধরনের কোচিং প্রদান করে না।\n- Swim Buddy একটি সাঁতারের স্কুল নয় এবং এর কোনও প্রশিক্ষক, উদ্ধারকারী বা তদারকির কর্মী নেই। অ্যাপে কিছুই পেশাদার, ক্রীড়া বা নিরাপত্তা নির্দেশনা গঠন করে না।\n\n3. বয়স সংক্রান্ত প্রয়োজনীয়তা\nSwim Buddy ১৮ বছর বা তার বেশি বয়সী ব্যবহারকারীদের জন্য তৈরি। নিবন্ধন করে, আপনি ঘোষণা করছেন এবং নিশ্চয়তা দিচ্ছেন যে আপনি এই প্রয়োজনীয়তা পূরণ করেন। নাবালকদের অন্তর্গত বলে চিহ্নিত অ্যাকাউন্টগুলি স্থগিত বা বন্ধ করা হবে।\n\n4. সাঁতারের স্তরের প্রয়োজনীয়তা\nSwim Buddy খোলা জলের সাঁতারকারীদের জন্য ডিজাইন করা হয়েছে যাদের কমপক্ষে উন্নত সাঁতারের স্তর রয়েছে। নিবন্ধন করে, আপনি নিশ্চিত করেন যে আপনি এই প্রয়োজনীয়তা পূরণ করেন। আপনি কোনও সাঁতারের গ্রুপ আপনার বর্তমান দক্ষতা স্তর এবং শারীরিক অবস্থার জন্য উপযুক্ত কিনা তা মূল্যায়ন করার জন্য একমাত্র দায়বদ্ধ।\n\n5. ঝুঁকি গ্রহণ\nখোলা জলে সাঁতার অন্তর্নিহিত ঝুঁকি জড়িত যার মধ্যে রয়েছে তবে সীমাবদ্ধ নয়: ডুবে যাওয়া, হাইপোথার্মিয়া, সামুদ্রিক জীবন, জলযান এবং অপ্রত্যাশিত আবহাওয়া। এই অ্যাপ ব্যবহার করে এবং সাঁতারের গ্রুপে অংশগ্রহণ করে, আপনি এই ঝুঁকিগুলি স্বীকার করেন এবং স্বেচ্ছায় গ্রহণ করেন।\n\n6. ব্যবহারকারী বাধ্যবাধকতা\n- আপনার সাঁতারের ক্ষমতা সম্পর্কে নির্ভুল তথ্য প্রদান করুন\n- শুধুমাত্র আপনার দক্ষতা স্তরের সাথে মিল রাখে এমন সাঁতারের গ্রুপে যোগ দিন\n- অন্যান্য অংশগ্রহণকারী এবং গ্রুপ সংগঠকদের সম্মান করুন\n- পূর্ব লিখিত সম্মতি ছাড়াই বাণিজ্যিক উদ্দেশ্যে অ্যাপ ব্যবহার করবেন না\n\n7. PRO প্ল্যান (পেইড সাবস্ক্রিপশন)\nSwim Buddy একটি ঐচ্ছিক পেইড সাবস্ক্রিপশন (\"Pro প্ল্যান\", মাসিক বা বার্ষিক) অফার করে যা অতিরিক্ত বৈশিষ্ট্য এবং উচ্চতর সীমা আনলক করে। কেনার আগে মূল্য সবসময় অ্যাপে দেখানো হয়।\n- বিলিং এবং স্বয়ংক্রিয় নবায়ন App Store বা Google Play তাদের শর্তাবলী অনুযায়ী প্রক্রিয়া করে; আমরা আপনার পেমেন্ট বিবরণ সংরক্ষণ করি না।\n- আপনি যেকোনো সময় আপনার স্টোরের সাবস্ক্রিপশন সেটিংসে বাতিল করতে পারেন; বাতিলকরণ বর্তমান বিলিং সময়ের শেষে কার্যকর হয়, আনুপাতিক ফেরত ছাড়াই, আইন বা স্টোরের নীতি দ্বারা প্রয়োজনীয় না হলে।\n- এই শর্তাবলী লঙ্ঘন অ্যাকাউন্ট স্থগিত বা বন্ধ হতে পারে, ইতিমধ্যে পরিশোধিত সময়ের ফেরত ছাড়াই।\n\n8. দায়বদ্ধতার সীমাবদ্ধতা\nআইন দ্বারা অনুমত সর্বাধিক পরিমাণে, Swim Buddy এবং এর অপারেটররা ব্যবহারকারীদের দ্বারা তৈরি এবং অ্যাপের মাধ্যমে সহজতর সাঁতারের গ্রুপে অংশগ্রহণ থেকে উদ্ভূত কোনও আঘাত, মৃত্যু, ক্ষতি বা ক্ষতির জন্য দায়বদ্ধ হবে না।\n\n9. প্রযোজ্য আইন\nএই শর্তগুলি ইউরোপীয় সংঘের আইন এবং পর্তুগালের জাতীয় আইন দ্বারা পরিচালিত হয়।\n\n10. পরিবর্তন\nআমরা এই শর্তগুলি আপডেট করতে পারি। আমরা অ্যাপের মাধ্যমে গুরুত্বপূর্ণ পরিবর্তনগুলির বিষয়ে আপনাকে অবহিত করব। বিজ্ঞপ্তির পরে অব্যাহত ব্যবহার গ্রহণ গঠন করে।\n\n11. যোগাযোগ\ncontact@swim-buddy.com","ru":"УСЛОВИЯ ИСПОЛЬЗОВАНИЯ — SWIM BUDDY\n\nПоследнее обновление: 4 июля 2026 г.\n\n1. ПРИНЯТИЕ\nСоздав учетную запись, вы подтверждаете, что прочитали и принимаете эти Условия использования и нашу Политику конфиденциальности.\n\n2. ЦЕЛЬ И ХАРАКТЕР УСЛУГИ\nSwim Buddy — это социальная сеть, единственной целью которой является соединение людей, занимающихся плаванием в открытой воде. Во избежание сомнений:\n- Swim Buddy НЕ организует, не продвигает, не проводит и не контролирует плавание или мероприятия. Группы плавания, указанные в приложении, создаются и управляются полностью самими пользователями, по их собственной инициативе и под их собственную ответственность. Swim Buddy просто предоставляет технологическую платформу, которая позволяет пользователям соединяться друг с другом.\n- Swim Buddy НЕ является средством обучения плаванию. Приложение не предоставляет уроки плавания, инструкции, планы тренировок или тренерскую подготовку.\n- Swim Buddy НЕ является плавательной школой и не имеет инструкторов, спасателей или контролирующего персонала. Ничто в приложении не представляет профессиональные, спортивные или инструкции по безопасности.\n\n3. ВОЗРАСТНОЕ ТРЕБОВАНИЕ\nSwim Buddy предназначен для пользователей от 18 лет. Регистрируясь, вы заявляете и гарантируете, что соответствуете этому требованию. Учетные записи, принадлежащие несовершеннолетним, будут приостановлены или закрыты.\n\n4. ТРЕБОВАНИЕ К УРОВНЮ ПЛАВАНИЯ\nSwim Buddy разработан для пловцов в открытой воде с МИНИМУМ продвинутым уровнем плавания. При регистрации вы подтверждаете, что соответствуете этому требованию. Вы несете единственную ответственность за оценку того, подходит ли вам какая-либо группа плавания для вашего текущего уровня навыков и физического состояния.\n\n5. ПРИНЯТИЕ РИСКА\nПлавание в открытой воде связано с присущими рисками, включая, но не ограничиваясь: утопление, гипотермия, морская жизнь, водные суда и непредвиденная погода. Используя это приложение и участвуя в группах плавания, вы признаете и добровольно принимаете эти риски.\n\n6. ОБЯЗАТЕЛЬСТВА ПОЛЬЗОВАТЕЛЯ\n- Предоставлять точную информацию о своих способностях к плаванию\n- Присоединяться только к группам плавания, соответствующим вашему уровню навыков\n- Уважать других участников и организаторов групп\n- Не использовать приложение в коммерческих целях без предварительного письменного согласия\n\n7. ПЛАН PRO (ПЛАТНАЯ ПОДПИСКА)\nSwim Buddy предлагает необязательную платную подписку (\"план Pro\", ежемесячную или годовую), которая открывает дополнительные функции и повышенные лимиты. Цена всегда отображается в приложении перед покупкой.\n- Оплата и автоматическое продление обрабатываются App Store или Google Play в соответствии с их условиями; мы не храним ваши платежные данные.\n- Вы можете отменить подписку в любой момент в настройках подписок вашего магазина; отмена вступает в силу в конце текущего расчетного периода, без пропорционального возврата средств, за исключением случаев, предусмотренных законом или политикой магазина.\n- Нарушение настоящих Условий может привести к приостановке или закрытию вашей учетной записи без возврата средств за уже оплаченный период.\n\n8. ОГРАНИЧЕНИЕ ОТВЕТСТВЕННОСТИ\nВ полной мере, допустимой законом, Swim Buddy и его операторы не несут ответственности за любые травмы, смерть, потери или убытки, вытекающие из участия в группах плавания, созданных пользователями и облегченных через приложение.\n\n9. ПРИМЕНИМОЕ ПРАВО\nЭти Условия регулируются законодательством Европейского союза и национальным законодательством Португалии.\n\n10. ИЗМЕНЕНИЯ\nМы можем обновить эти Условия. Мы уведомим вас о существенных изменениях через приложение. Продолжение использования после уведомления представляет собой принятие.\n\n11. КОНТАКТ\ncontact@swim-buddy.com","ja":"利用規約 — SWIM BUDDY\n\n最終更新日：2026年7月4日\n\n1. 受け入れ\nアカウントを作成することで、本利用規約および当社のプライバシーポリシーを読んで同意したことを確認します。\n\n2. サービスの目的と性質\nSwim Buddyは、オープンウォータースイミングを実践する人々を結びつけることを唯一の目的とするソーシャルネットワークです。誤解を避けるため：\n- Swim Buddyは、スイミングやイベントを企画、宣伝、開催、または監督しません。アプリに掲載されているスイムグループは、ユーザー自身の主導により、ユーザー自身の責任の下で、完全にユーザー自身によって作成および運営されます。Swim Buddyは、ユーザーが相互に接続できるようにする技術プラットフォームを提供するだけです。\n- Swim Buddyは水泳を学ぶための手段ではありません。アプリはスイミングレッスン、指導、トレーニングプラン、またはコーチングを提供していません。\n- Swim Buddyはスイミングスクールではなく、インストラクター、ライフガード、または監督スタッフはありません。アプリ内のいかなるコンテンツも専門的、スポーツ、または安全指導を構成しません。\n\n3. 年齢要件\nSwim Buddyは18歳以上の利用者を対象としています。登録することで、この要件を満たしていることを宣言し、保証するものとします。未成年者に属することが判明したアカウントは停止または終了されます。\n\n4. スイミングレベル要件\nSwim Buddyは、少なくとも高度なスイミングレベルを持つオープンウォータースイマーを対象に設計されています。登録することで、本要件を満たしていることを確認します。スイムグループがあなたの現在のスキルレベルと身体状況に適切であるかどうかを評価する責任は、あなただけにあります。\n\n5. リスク受け入れ\nオープンウォータースイミングは、溺水、低体温症、海洋生物、船舶、予期しない気象を含むがこれらに限定されない固有のリスクを伴います。本アプリを使用してスイムグループに参加することにより、あなたはこれらのリスクを認識し、自発的に受け入れます。\n\n6. ユーザーの義務\n- スイミング能力に関する正確な情報を提供する\n- スキルレベルに合ったスイムグループにのみ参加する\n- 他の参加者とグループ主催者を尊重する\n- 事前の書面による同意なしに商用目的でアプリを使用しない\n\n7. PROプラン（有料サブスクリプション）\nSwim Buddyは、追加機能とより高い上限を解放する任意の有料サブスクリプション（「Proプラン」、月額または年額）を提供しています。価格は購入前に必ずアプリ内に表示されます。\n- 請求と自動更新は、App StoreまたはGoogle Playがそれぞれの規約に従って処理します。当社はお支払い情報を保存しません。\n- ストアのサブスクリプション設定でいつでもキャンセルできます。キャンセルは現在の請求期間の終了時に有効となり、法律またはストアのポリシーで義務付けられている場合を除き、日割りの返金はありません。\n- 本規約への違反は、既に支払われた期間の返金なしに、アカウントの停止または終了につながる場合があります。\n\n8. 責任制限\n法律で許可されている最大限の範囲内において、Swim Buddyおよびその運営者は、ユーザーによって作成され、アプリを通じて便宜を図られたスイムグループへの参加から生じるいかなる傷害、死亡、損失、または損害についても責任を負いません。\n\n9. 準拠法\n本規約は、欧州連合の法律およびポルトガルの国内法に準拠します。\n\n10. 変更\n本規約を更新する可能性があります。重大な変更についてはアプリを通じて通知します。通知後の継続的な使用は受け入れの構成となります。\n\n11. お問い合わせ\ncontact@swim-buddy.com","tr":"KULLANIM KOŞULLARI — SWIM BUDDY\n\nSon güncelleme: 4 Temmuz 2026\n\n1. KABUL\nHesap oluşturarak, bu Kullanım Koşullarını ve Gizlilik Politikamızı okuduğunuzu ve kabul ettiğinizi onaylarsınız.\n\n2. HİZMETİN AMACI VE DOĞASI\nSwim Buddy, açık su yüzme yapan kişileri bağlamak amacıyla tasarlanmış bir sosyal ağdır. Herhangi bir şüpheden kaçınmak için:\n- Swim Buddy yüzme veya etkinlikleri organize etmez, tanıtmaz, barındırmaz veya denetlemez. Uygulamada listelenen yüzme grupları tamamen kullanıcılar tarafından kendi inisiyatifiyle ve kendi sorumluluğu altında oluşturulur ve işletilir. Swim Buddy, kullanıcıların birbirine bağlanmasını sağlayan teknolojik platformu sağlayıp sağlamaz.\n- Swim Buddy yüzme öğrenmenin bir aracı değildir. Uygulama yüzme dersleri, talimatları, antrenman planları veya koçluk sağlamaz.\n- Swim Buddy bir yüzme okulu değildir ve antrenörleri, cankurturanları veya denetim personeli yoktur. Uygulamadaki hiçbir şey profesyonel, sportif veya güvenlik talimatı oluşturmaz.\n\n3. YAŞ GEREKLİLİĞİ\nSwim Buddy, 18 yaş ve üzeri kullanıcılara yöneliktir. Kaydolarak, bu gerekliliği karşıladığınızı beyan eder ve garanti edersiniz. Reşit olmayanlara ait olduğu tespit edilen hesaplar askıya alınacak veya kapatılacaktır.\n\n4. YÜZME SEVİYESİ GEREKLİLİĞİ\nSwim Buddy, en azından ileri yüzme seviyesine sahip açık su yüzücüleri için tasarlanmıştır. Kaydolarak, bu gereksinimi karşıladığınızı onaylarsınız. Herhangi bir yüzme grubunun mevcut beceri seviyeniz ve fiziki durumunuz için uygun olup olmadığını değerlendirmek tek sorumluluğu taşırsınız.\n\n5. RİSK KABULU\nAçık su yüzme, boğulma, hipotermisi, deniz hayatı, su taşıtları ve öngörülemeyen hava dahil olmak üzere ancak bunlarla sınırlı olmamak üzere doğal riskler taşır. Bu uygulamayı kullanarak ve yüzme gruplarına katılarak, bu riskleri kabul eder ve gönüllü olarak kabul edersiniz.\n\n6. KULLANICI YÜKÜMLÜLÜKLERİ\n- Yüzme beceriniz hakkında doğru bilgi sağlayın\n- Yalnızca beceri seviyenize uyan yüzme gruplarına katılın\n- Diğer katılımcılara ve grup organizatörlerine saygı gösterin\n- Önceki yazılı izin olmadan uygulamayı ticari amaçlar için kullanmayın\n\n7. PRO PLAN (ÜCRETLİ ABONELİK)\nSwim Buddy, ek özellikleri ve daha yüksek limitleri açan isteğe bağlı bir ücretli abonelik (\"Pro plan\", aylık veya yıllık) sunar. Fiyat, satın almadan önce her zaman uygulamada gösterilir.\n- Faturalandırma ve otomatik yenileme, App Store veya Google Play tarafından kendi koşullarına göre işlenir; ödeme bilgilerinizi saklamayız.\n- Mağazanızın abonelik ayarlarından istediğiniz zaman iptal edebilirsiniz; iptal, mevcut faturalandırma döneminin sonunda geçerli olur ve yasa veya mağaza politikası gerektirmedikçe orantılı iade yapılmaz.\n- Bu Koşulların ihlali, halihazırda ödenen dönemin iadesi olmaksızın hesabınızın askıya alınmasına veya kapatılmasına neden olabilir.\n\n8. SORUMLULUK SINIRI\nHukuk tarafından izin verilen azami ölçüde, Swim Buddy ve operatörleri, kullanıcılar tarafından oluşturulan ve uygulama tarafından kolaylaştırılan yüzme gruplarına katılımından kaynaklanan herhangi bir yaralanma, ölüm, kayıp veya hasar için sorumlu değildir.\n\n9. UYGULANACAK HUKUK\nBu Koşullar, Avrupa Birliği'nin kanunları ve Portekiz'in ulusal mevzuatı tarafından yönetilir.\n\n10. DEĞİŞİKLİKLER\nBu Koşulları güncelleyebiliriz. Önemli değişiklikler hakkında sizi uygulama aracılığıyla bilgilendireceğiz. Bildirimden sonra süregelen kullanım, kabul anlamına gelir.\n\n11. İLETİŞİM\ncontact@swim-buddy.com","ko":"이용 약관 — SWIM BUDDY\n\n마지막 업데이트: 2026년 7월 4일\n\n1. 수락\n계정을 생성함으로써 본 이용 약관 및 개인정보 보호정책을 읽고 동의했음을 확인합니다.\n\n2. 서비스의 목적과 성질\nSwim Buddy는 개방 수역 수영을 하는 사람들을 연결하는 것을 유일한 목적으로 하는 소셜 네트워크입니다. 의심의 여지를 피하기 위해:\n- Swim Buddy는 수영이나 이벤트를 조직, 홍보, 개최 또는 감독하지 않습니다. 앱에 나열된 수영 그룹은 사용자 자신의 주도로 사용자 자신의 책임 하에 사용자 자신에 의해 완전히 생성 및 운영됩니다. Swim Buddy는 사용자가 서로 연결할 수 있도록 하는 기술 플랫폼을 제공할 뿐입니다.\n- Swim Buddy는 수영을 배우는 수단이 아닙니다. 앱은 수영 레슨, 지침, 교육 계획 또는 코칭을 제공하지 않습니다.\n- Swim Buddy는 수영 학교가 아니며 강사, 구조요원 또는 감독 직원이 없습니다. 앱의 아무것도 전문적, 스포츠 또는 안전 지침을 구성하지 않습니다.\n\n3. 연령 요건\nSwim Buddy는 만 18세 이상 사용자를 대상으로 합니다. 등록함으로써 귀하는 이 요건을 충족함을 선언하고 보증합니다. 미성년자 소유로 확인된 계정은 정지되거나 종료됩니다.\n\n4. 수영 레벨 요구사항\nSwim Buddy는 최소한 고급 수영 레벨을 가진 개방 수역 수영자를 위해 설계되었습니다. 등록함으로써 본 요구사항을 충족함을 확인합니다. 어느 수영 그룹이 현재의 기술 수준과 신체 상태에 적절한지 평가할 책임은 전적으로 귀사에 있습니다.\n\n5. 위험 수락\n개방 수역 수영에는 익사, 저체온증, 해양 생물, 선박 및 예상치 못한 날씨를 포함하되 이에 국한되지 않는 내재적 위험이 포함됩니다. 본 앱을 사용하고 수영 그룹에 참가함으로써 이러한 위험을 인정하고 자발적으로 수락합니다.\n\n6. 사용자 의무\n- 수영 능력에 관한 정확한 정보 제공\n- 기술 수준에 맞는 수영 그룹에만 참가\n- 다른 참가자 및 그룹 주최자 존중\n- 사전 서면 동의 없이 상업적 목적으로 앱 사용 금지\n\n7. PRO 플랜(유료 구독)\nSwim Buddy는 추가 기능과 더 높은 한도를 잠금 해제하는 선택적 유료 구독(\"Pro 플랜\", 월간 또는 연간)을 제공합니다. 가격은 구매 전에 항상 앱에 표시됩니다.\n- 결제 및 자동 갱신은 App Store 또는 Google Play가 자체 약관에 따라 처리하며, 당사는 귀하의 결제 정보를 저장하지 않습니다.\n- 스토어의 구독 설정에서 언제든지 취소할 수 있으며, 취소는 현재 결제 기간 종료 시 적용되고 법률 또는 스토어 정책에서 요구하는 경우를 제외하고 비례 환불은 제공되지 않습니다.\n- 본 약관 위반 시 이미 결제된 기간에 대한 환불 없이 계정이 정지되거나 해지될 수 있습니다.\n\n8. 책임 제한\n법에서 허용하는 최대 한도 내에서 Swim Buddy 및 그 운영자는 사용자가 생성하고 앱을 통해 용이하게 된 수영 그룹 참가로 인한 모든 부상, 사망, 손실 또는 손해에 대해 책임을 지지 않습니다.\n\n9. 준거법\n본 약관은 유럽연합의 법률 및 포르투갈의 국내 법률에 의해 관할됩니다.\n\n10. 변경\n본 약관을 업데이트할 수 있습니다. 중요한 변경 사항은 앱을 통해 알려드립니다. 통지 후 계속 사용하면 동의한 것으로 간주됩니다.\n\n11. 연락처\ncontact@swim-buddy.com","vi":"ĐIỀU KHOẢN SỬ DỤNG — SWIM BUDDY\n\nCập nhật lần cuối: 4 tháng 7 năm 2026\n\n1. CHẤP NHẬN\nBằng cách tạo tài khoản, bạn xác nhận rằng bạn đã đọc và chấp nhận các Điều khoản Sử dụng này và Chính sách Bảo mật của chúng tôi.\n\n2. MỤC ĐÍCH VÀ TÍNH CHẤT CỦA DỊCH VỤ\nSwim Buddy là một mạng xã hội có mục đích duy nhất là kết nối những người tập bơi ngoài khơi. Để tránh nhầm lẫn:\n- Swim Buddy không tổ chức, quảng cáo, tổ chức hoặc giám sát bơi hoặc sự kiện. Các nhóm bơi được liệt kê trong ứng dụng được tạo và vận hành hoàn toàn bởi chính những người dùng, theo sáng kiến của riêng họ và dưới trách nhiệm của riêng họ. Swim Buddy chỉ cung cấp nền tảng công nghệ cho phép người dùng kết nối với nhau.\n- Swim Buddy KHÔNG phải là phương tiện học bơi. Ứng dụng không cung cấp bất kỳ bài học bơi, hướng dẫn, kế hoạch tập luyện hoặc huấn luyện viên.\n- Swim Buddy KHÔNG phải là một trường bơi và không có huấn luyện viên, cứu hộ hoặc nhân viên giám sát. Không có gì trong ứng dụng tạo thành hướng dẫn chuyên nghiệp, thể thao hoặc an toàn.\n\n3. YÊU CẦU VỀ ĐỘ TUỔI\nSwim Buddy dành cho người dùng từ 18 tuổi trở lên. Bằng cách đăng ký, bạn tuyên bố và đảm bảo rằng bạn đáp ứng yêu cầu này. Các tài khoản được phát hiện thuộc về người chưa thành niên sẽ bị đình chỉ hoặc chấm dứt.\n\n4. YÊU CẦU CẤP ĐỘ BƠI\nSwim Buddy được thiết kế cho những người bơi ngoài khơi có ít nhất cấp độ bơi nâng cao. Bằng cách đăng ký, bạn xác nhận rằng bạn đáp ứng yêu cầu này. Bạn là người duy nhất chịu trách nhiệm đánh giá xem nhóm bơi nào phù hợp với cấp độ kỹ năng và tình trạng thể chất hiện tại của bạn.\n\n5. CHẤP NHẬN RỦI RO\nBơi ngoài khơi liên quan đến các rủi ro vốn có bao gồm nhưng không giới hạn ở: chết đuối, hạ thân nhiệt, sự sống biển, tàu thuyền và thời tiết không lường trước. Bằng cách sử dụng ứng dụng này và tham gia các nhóm bơi, bạn thừa nhận và tự nguyện chấp nhận những rủi ro này.\n\n6. NGHĨA VỤ CỦA NGƯỜI DÙNG\n- Cung cấp thông tin chính xác về khả năng bơi của bạn\n- Chỉ tham gia các nhóm bơi phù hợp với cấp độ kỹ năng của bạn\n- Tôn trọng những người tham gia khác và người tổ chức nhóm\n- Không sử dụng ứng dụng cho mục đích thương mại mà không có sự chấp thuận bằng văn bản trước\n\n7. GÓI PRO (ĐĂNG KÝ TRẢ PHÍ)\nSwim Buddy cung cấp gói đăng ký trả phí tùy chọn (\"gói Pro\", hàng tháng hoặc hàng năm) mở khóa các tính năng bổ sung và giới hạn cao hơn. Giá luôn được hiển thị trong ứng dụng trước khi mua.\n- Việc thanh toán và gia hạn tự động được App Store hoặc Google Play xử lý theo điều khoản riêng của họ; chúng tôi không lưu trữ thông tin thanh toán của bạn.\n- Bạn có thể hủy bất kỳ lúc nào trong cài đặt đăng ký của cửa hàng; việc hủy có hiệu lực vào cuối chu kỳ thanh toán hiện tại, không hoàn tiền theo tỷ lệ, trừ khi pháp luật hoặc chính sách của cửa hàng yêu cầu.\n- Vi phạm các Điều khoản này có thể dẫn đến việc đình chỉ hoặc chấm dứt tài khoản của bạn mà không hoàn tiền cho kỳ đã thanh toán.\n\n8. GIỚI HẠN TRÁCH NHIỆM\nTrong phạm vi tối đa được phép bởi pháp luật, Swim Buddy và những người khai thác của nó không chịu trách nhiệm về bất kỳ thương tích, tử vong, tổn thất hoặc thiệt hại nào phát sinh từ sự tham gia vào các nhóm bơi được tạo bởi người dùng và được tạo điều kiện thuận lợi thông qua ứng dụng.\n\n9. LUẬT ĐIỀU CHỈNH\nCác Điều khoản này được điều chỉnh bởi luật pháp của Liên minh Châu Âu và luật pháp quốc gia của Bồ Đào Nha.\n\n10. THAY ĐỔI\nChúng tôi có thể cập nhật các Điều khoản này. Chúng tôi sẽ thông báo cho bạn về những thay đổi quan trọng qua ứng dụng. Việc sử dụng liên tục sau khi thông báo cấu thành sự chấp nhận.\n\n11. LIÊN HỆ\ncontact@swim-buddy.com","pl":"WARUNKI UŻYTKOWANIA — SWIM BUDDY\n\nOstatnia aktualizacja: 4 lipca 2026\n\n1. AKCEPTACJA\nPoprzez utworzenie konta potwierdzasz, że przeczytałeś i akceptujesz niniejsze Warunki użytkowania i naszą Politykę prywatności.\n\n2. CEL I NATURA USŁUGI\nSwim Buddy to sieć społeczna, której jedynym celem jest łączenie osób uprawiających pływanie na otwartej wodzie. Dla uniknięcia wątpliwości:\n- Swim Buddy NIE organizuje, nie promuje, nie przeprowadza ani nie nadzoruje pływania ani imprez. Grupy pływackie wymienione w aplikacji są tworzone i obsługiwane całkowicie przez samych użytkowników, z ich własnej inicjatywy i pod ich własną odpowiedzialność. Swim Buddy jedynie udostępnia platformę technologiczną, która umożliwia użytkownikom wzajemne połączenie.\n- Swim Buddy NIE jest środkiem do nauki pływania. Aplikacja nie zapewnia lekcji pływania, instrukcji, planów treningowych ani żadnego rodzaju coachingu.\n- Swim Buddy NIE jest szkołą pływania i nie ma instruktorów, ratowników ani personelu nadzorczego. Nic w aplikacji nie stanowi instrukcji profesjonalnej, sportowej ani bezpieczeństwa.\n\n3. WYMÓG WIEKOWY\nSwim Buddy jest przeznaczona dla użytkowników w wieku 18 lat lub starszych. Rejestrując się, oświadczasz i gwarantujesz, że spełniasz ten wymóg. Konta, co do których stwierdzono, że należą do osób niepełnoletnich, zostaną zawieszone lub zamknięte.\n\n4. WYMÓG POZIOMU PŁYWANIA\nSwim Buddy jest zaprojektowana dla pływaków na otwartej wodzie co najmniej z zaawansowanym poziomem pływania. Rejestrując się, potwierdzasz, że spełniasz ten wymóg. Jesteś wyłącznie odpowiedzialny za ocenę, czy jakakolwiek grupa pływacka jest odpowiednia dla twojego obecnego poziomu umiejętności i kondycji fizycznej.\n\n5. PRZYJĘCIE RYZYKA\nPływanie na otwartej wodzie wiąże się z nieodłącznymi zagrożeniami, w tym, ale nie ograniczonymi do: utonięcia, hipotermii, życia morskiego, jednostek pływających i nieprzewidzianej pogody. Używając tej aplikacji i uczestnicząc w grupach pływackich, potwierdzasz i dobrowolnie akceptujesz te ryzyko.\n\n6. OBOWIĄZKI UŻYTKOWNIKA\n- Podaj dokładne informacje o swoich umiejętnościach pływania\n- Dołączaj tylko do grup pływackich pasujących do twojego poziomu umiejętności\n- Szanuj innych uczestników i organizatorów grup\n- Nie używaj aplikacji do celów handlowych bez uprzedniej pisemnej zgody\n\n7. PLAN PRO (PŁATNA SUBSKRYPCJA)\nSwim Buddy oferuje opcjonalną płatną subskrypcję (\"plan Pro\", miesięczną lub roczną), która odblokowuje dodatkowe funkcje i wyższe limity. Cena jest zawsze wyświetlana w aplikacji przed zakupem.\n- Rozliczenia i automatyczne odnawianie są przetwarzane przez App Store lub Google Play zgodnie z ich warunkami; nie przechowujemy Twoich danych płatniczych.\n- Możesz anulować w dowolnym momencie w ustawieniach subskrypcji swojego sklepu; anulowanie staje się skuteczne z końcem bieżącego okresu rozliczeniowego, bez proporcjonalnego zwrotu, chyba że wymaga tego prawo lub polityka sklepu.\n- Naruszenie niniejszych Warunków może skutkować zawieszeniem lub zamknięciem konta, bez zwrotu za już opłacony okres.\n\n8. OGRANICZENIE ODPOWIEDZIALNOŚCI\nW maksymalnym zakresie dopuszczonym przez prawo, Swim Buddy i jej operatorzy nie ponoszą odpowiedzialności za żadne obrażenia, śmierć, straty lub szkody wynikające z udziału w grupach pływackich tworzonych przez użytkowników i ułatwianych za pośrednictwem aplikacji.\n\n9. PRAWO WŁAŚCIWE\nNiniejsze Warunki podlegają prawu Unii Europejskiej i krajowemu prawu Portugalii.\n\n10. ZMIANY\nMożemy aktualizować niniejsze Warunki. Powiadomimy cię o istotnych zmianach za pośrednictwem aplikacji. Dalsze korzystanie po powiadomieniu stanowi przyjęcie.\n\n11. KONTAKT\ncontact@swim-buddy.com","nl":"GEBRUIKSVOORWAARDEN — SWIM BUDDY\n\nLaatst bijgewerkt: 4 juli 2026\n\n1. ACCEPTATIE\nDoor een account aan te maken bevestig je dat je deze Gebruiksvoorwaarden en ons Privacybeleid hebt gelezen en geaccepteerd.\n\n2. DOEL EN AARD VAN DE DIENST\nSwim Buddy is een sociaal netwerk met als enig doel het verbinden van mensen die open water zwemmen. Ter voorkoming van twijfel:\n- Swim Buddy organiseert, promoot, gastheren of houdt toezicht op niet op zwemmen of evenementen. Zwemgroepen die in de app worden vermeld, worden volledig door de gebruikers zelf gemaakt en beheerd, op hun eigen initiatief en onder hun eigen verantwoordelijkheid. Swim Buddy levert slechts het technologische platform dat gebruikers met elkaar kan verbinden.\n- Swim Buddy is GEEN middel om zwemmen te leren. De app biedt geen zwemles, instructies, trainingsschema's of coaching van enig soort.\n- Swim Buddy is GEEN zwemschool en heeft geen trainers, badmeesters of toezichthoudend personeel. Niets in de app vormt professionele, sportieve of veiligheidsaanwijzingen.\n\n3. LEEFTIJDSVEREISTE\nSwim Buddy is bedoeld voor gebruikers van 18 jaar of ouder. Door u te registreren, verklaart en garandeert u dat u aan deze vereiste voldoet. Accounts waarvan wordt vastgesteld dat ze aan minderjarigen toebehoren, worden geschorst of beëindigd.\n\n4. VEREISTE ZWEMNIVEAU\nSwim Buddy is ontworpen voor open water zwemmers met minstens een gevorderd zwemniveau. Door u in te schrijven, bevestigt u dat u aan deze vereiste voldoet. U bent als enige verantwoordelijk voor het beoordelen of een zwemgroep geschikt is voor uw huidige vaardigheidsniveau en fysieke toestand.\n\n5. RISICOAANVAARDING\nOpen water zwemmen brengt inherente risico's met zich mee, waaronder maar niet beperkt tot: verdrinking, onderkoeling, zeeëleven, watervaartuigen en onverwacht weer. Door deze app te gebruiken en deel te nemen aan zwemgroepen, erkent u deze risico's en accepteert u ze vrijwillig.\n\n6. VERPLICHTINGEN VAN GEBRUIKER\n- Verstrek nauwkeurige informatie over uw zwemvaardigheid\n- Sluit u alleen aan bij zwemgroepen die aansluiten bij uw vaardigheidsniveau\n- Respecteer andere deelnemers en groepsorganisatoren\n- Gebruik de app niet voor commerciële doeleinden zonder voorafgaande schriftelijke toestemming\n\n7. PRO-PLAN (BETAALD ABONNEMENT)\nSwim Buddy biedt een optioneel betaald abonnement (\"Pro-plan\", maandelijks of jaarlijks) dat extra functies en hogere limieten ontgrendelt. De prijs wordt vóór aankoop altijd in de app getoond.\n- Facturering en automatische verlenging worden verwerkt door de App Store of Google Play volgens hun eigen voorwaarden; wij slaan uw betalingsgegevens niet op.\n- U kunt op elk moment opzeggen in de abonnementsinstellingen van uw store; de opzegging gaat in aan het einde van de lopende factureringsperiode, zonder pro-rata terugbetaling, tenzij wettelijk of door het beleid van de store vereist.\n- Schending van deze Voorwaarden kan leiden tot opschorting of beëindiging van uw account, zonder terugbetaling van de reeds betaalde periode.\n\n8. BEPERKING VAN AANSPRAKELIJKHEID\nVoor zover wettelijk toegestaan, zijn Swim Buddy en haar exploitanten niet aansprakelijk voor enig letsel, dood, verlies of schade voortvloeiend uit deelname aan zwemgroepen gemaakt door gebruikers en gefaciliteerd via de app.\n\n9. TOEPASSELIJK RECHT\nDeze Voorwaarden worden beheerst door de wetgeving van de Europese Unie en de nationale wetgeving van Portugal.\n\n10. WIJZIGINGEN\nWe kunnen deze Voorwaarden bijwerken. We zullen u via de app op de hoogte stellen van materiële wijzigingen. Voortdurend gebruik na melding vormt aanvaarding.\n\n11. CONTACT\ncontact@swim-buddy.com"};
const NAV = {"en":{"mission":"Mission","features":"Features","plans":"Plans","contact":"Contact","back":"Back to home","privacy":"Privacy Policy","terms":"Terms of Use"},"pt":{"mission":"Missão","features":"Funcionalidades","plans":"Planos","contact":"Contato","back":"Voltar ao início","privacy":"Política de Privacidade","terms":"Termos de Uso"},"es":{"mission":"Misión","features":"Funciones","plans":"Planes","contact":"Contacto","back":"Volver al inicio","privacy":"Política de Privacidad","terms":"Términos de Uso"},"de":{"mission":"Mission","features":"Funktionen","plans":"Pläne","contact":"Kontakt","back":"Zurück zur Startseite","privacy":"Datenschutzrichtlinie","terms":"Nutzungsbedingungen"},"fr":{"mission":"Mission","features":"Fonctionnalités","plans":"Offres","contact":"Contact","back":"Retour à l'accueil","privacy":"Politique de Confidentialité","terms":"Conditions d'Utilisation"},"it":{"mission":"Missione","features":"Funzionalità","plans":"Piani","contact":"Contatto","back":"Torna alla home","privacy":"Informativa sulla Privacy","terms":"Termini di Utilizzo"},"hu":{"mission":"Küldetés","features":"Funkciók","plans":"Csomagok","contact":"Kapcsolat","back":"Vissza a főoldalra","privacy":"Adatvédelmi Nyilatkozat","terms":"Felhasználási Feltételek"},"zh":{"mission":"使命","features":"功能","plans":"方案","contact":"联系","back":"返回首页","privacy":"隐私政策","terms":"使用条款"},"hi":{"mission":"मिशन","features":"विशेषताएँ","plans":"प्लान","contact":"संपर्क","back":"होम पर वापस जाएँ","privacy":"गोपनीयता नीति","terms":"उपयोग की शर्तें"},"bn":{"mission":"মিশন","features":"বৈশিষ্ট্য","plans":"প্ল্যান","contact":"যোগাযোগ","back":"হোমে ফিরুন","privacy":"গোপনীয়তা নীতি","terms":"ব্যবহারের শর্তাবলী"},"ru":{"mission":"Миссия","features":"Возможности","plans":"Тарифы","contact":"Контакты","back":"На главную","privacy":"Политика Конфиденциальности","terms":"Условия Использования"},"ja":{"mission":"ミッション","features":"機能","plans":"プラン","contact":"お問い合わせ","back":"ホームに戻る","privacy":"プライバシーポリシー","terms":"利用規約"},"tr":{"mission":"Misyon","features":"Özellikler","plans":"Planlar","contact":"İletişim","back":"Ana sayfaya dön","privacy":"Gizlilik Politikası","terms":"Kullanım Koşulları"},"ko":{"mission":"미션","features":"기능","plans":"플랜","contact":"문의","back":"홈으로 돌아가기","privacy":"개인정보 보호정책","terms":"이용 약관"},"vi":{"mission":"Sứ mệnh","features":"Tính năng","plans":"Gói","contact":"Liên hệ","back":"Về trang chủ","privacy":"Chính sách Bảo mật","terms":"Điều khoản Sử dụng"},"pl":{"mission":"Misja","features":"Funkcje","plans":"Plany","contact":"Kontakt","back":"Powrót do strony głównej","privacy":"Polityka Prywatności","terms":"Warunki Użytkowania"},"nl":{"mission":"Missie","features":"Functies","plans":"Plannen","contact":"Contact","back":"Terug naar home","privacy":"Privacybeleid","terms":"Gebruiksvoorwaarden"}};
const LANG_LABELS = {"en":"EN","pt":"PT","es":"ES","de":"DE","fr":"FR","it":"IT","hu":"HU","zh":"中文","hi":"हिं","bn":"বাং","ru":"RU","ja":"日本語","tr":"TR","ko":"한국어","vi":"VI","pl":"PL","nl":"NL"};
const CURRENT = "terms";
const OTHER_LABEL_KEY = CURRENT === "privacy" ? "terms" : "privacy";

function detectLang() {
  const saved = localStorage.getItem("bs-lang");
  if (saved && DOCS[saved]) return saved;
  return "pt";
}

function applyLang(lang) {
  const nav = NAV[lang] || NAV.en;
  document.documentElement.lang = lang;
  document.getElementById("legalBody").textContent = DOCS[lang] || DOCS.en;
  document.querySelectorAll('[data-nav="mission"]').forEach(el => el.textContent = nav.mission);
  document.querySelectorAll('[data-nav="features"]').forEach(el => el.textContent = nav.features);
  document.querySelectorAll('[data-nav="plans"]').forEach(el => el.textContent = nav.plans);
  document.querySelectorAll('[data-nav="contact"]').forEach(el => el.textContent = nav.contact);
  document.querySelectorAll('[data-nav="back"]').forEach(el => el.textContent = nav.back);
  document.querySelectorAll('[data-nav="privacy"]').forEach(el => el.textContent = nav.privacy);
  document.querySelectorAll('[data-nav="terms"]').forEach(el => el.textContent = nav.terms);
  document.querySelector('[data-nav="switchLabel"]').textContent = "";
  document.querySelector('[data-nav="switchLink"]').textContent = nav[OTHER_LABEL_KEY];
  document.getElementById("langLabel").textContent = LANG_LABELS[lang] || lang.toUpperCase();
  document.querySelectorAll(".lang-option").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
  localStorage.setItem("bs-lang", lang);
}

const langBtn = document.getElementById("langBtn");
const langDropdown = document.getElementById("langDropdown");
langBtn.addEventListener("click", e => { e.stopPropagation(); langDropdown.classList.toggle("open"); });
document.addEventListener("click", () => langDropdown.classList.remove("open"));
document.querySelectorAll(".lang-option").forEach(btn => {
  btn.addEventListener("click", () => { applyLang(btn.dataset.lang); langDropdown.classList.remove("open"); });
});

applyLang(detectLang());
</script>
