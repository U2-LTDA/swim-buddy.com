  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A1A2E; --bg2: #0E2240; --card: #112348;
      --primary: #00B4D8; --primary-dark: #0096B7;
      --fg: #E8F3FA; --muted: #7BA7BC; --border: #1E3A5F; --radius: 12px;
      --gold: #E8B84B; --gold-bg: #E8B84B1A; --gold-border: #E8B84B55;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--muted); font-size: 14px; font-weight: 500; }
    .nav-links a:hover { color: var(--fg); text-decoration: none; }

    .lang-switcher { position: relative; }
    .lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--fg); padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .lang-btn:hover { border-color: var(--primary); }
    .lang-dropdown { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow-y: auto; max-height: 60vh; min-width: 140px; z-index: 200; }
    .lang-dropdown.open { display: block; }
    .lang-option { display: block; width: 100%; padding: 10px 14px; font-size: 13px; color: var(--fg); background: none; border: none; text-align: left; cursor: pointer; }
    .lang-option:hover { background: var(--bg2); }
    .lang-option.active { color: var(--primary); font-weight: 600; }

    .legal-wrap { max-width: 720px; margin: 0 auto; padding: 56px 24px 100px; }
    .legal-back { display: inline-block; font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .legal-back:hover { color: var(--fg); }
    .legal-doc { white-space: pre-wrap; font-size: 15px; color: var(--fg); background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; }
    .legal-switch { margin-top: 20px; font-size: 14px; color: var(--muted); }

    footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 40px 24px; text-align: center; margin-top: 40px; }
    .footer-logo { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .footer-links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
    .footer-links a { font-size: 13px; color: var(--muted); }
    .footer-links a:hover { color: var(--fg); text-decoration: none; }

    @media (max-width: 680px) { .nav-links { display: none; } }
  </style>

<script>
const DOCS = {"en":"PRIVACY POLICY — SWIM BUDDY\n\nLast updated: 4 July 2026\n\n1. CONTROLLER\nSwim Buddy (\"we\", \"us\") is the data controller responsible for your personal data.\nContact for data requests: privacy@swim-buddy.com\n\n2. DATA WE COLLECT\n- Account data: name, email address, password (hashed by Clerk)\n- Profile data: city, state, country, bio\n- Activity data: swim groups created, swim groups joined, attendance record, presence rating\n- Device data: push notification token\n- Consent records: timestamps of when you accepted this policy and the terms of use\n\n3. PURPOSES AND LEGAL BASIS\n- Providing the service (contract, Art. 6(1)(b) GDPR): account management, swim group creation, group discovery\n- Notifications (consent, Art. 6(1)(a)): push notifications for group updates\n- Legal compliance (Art. 6(1)(c)): retaining consent records\n\n4. THIRD PARTIES\n- Clerk (auth.clerk.com): authentication and identity management. Your email and credentials are processed by Clerk under their own Privacy Policy.\n- Expo Push Notification Service (expo.dev): delivery of push notifications. Your push token is transmitted to Expo's servers.\n- RevenueCat (revenuecat.com): management of Pro plan subscriptions. Your user identifier and purchase data are processed by RevenueCat under their own Privacy Policy.\n- Supabase (supabase.com): database hosting. Your account, profile and activity data are stored on Supabase infrastructure.\n- Fly.io (fly.io): API hosting. Your data transits through and is processed on Fly.io servers.\n\n5. DATA RETENTION\nYour data is retained for as long as your account is active. Upon account deletion, all personal data is permanently erased from our systems within 30 days, except where retention is required by law.\n\n6. YOUR RIGHTS (GDPR Art. 15–22)\nYou have the right to:\n- Access your personal data (request a copy via the \"Export My Data\" feature)\n- Rectify inaccurate data (edit your profile at any time)\n- Erase your data (\"Delete Account\" in your profile)\n- Portability of your data (JSON export via \"Export My Data\")\n- Withdraw consent at any time (does not affect prior processing)\n- Lodge a complaint with your national supervisory authority\n\n7. SECURITY\nWe use HTTPS for all data transmission. Authentication tokens are never logged. Passwords are hashed by Clerk and never stored by us.\n\n8. CONTACT\nTo exercise your rights or for any privacy question: privacy@swim-buddy.com","pt":"POLÍTICA DE PRIVACIDADE — SWIM BUDDY\n\nÚltima atualização: 4 de julho de 2026\n\n1. CONTROLADOR\nA Swim Buddy (\"nós\") é a controladora responsável pelos seus dados pessoais.\nContato para solicitações sobre dados: privacy@swim-buddy.com\n\n2. DADOS QUE COLETAMOS\n- Dados da conta: nome, endereço de e-mail, senha (com hash feito pela Clerk)\n- Dados de perfil: cidade, estado, país, bio\n- Dados de atividade: grupos criados, grupos em que entrou, histórico de presença, avaliação de presença\n- Dados do dispositivo: token de notificação push\n- Registros de consentimento: data e hora em que você aceitou esta política e os termos de uso\n\n3. FINALIDADES E BASE LEGAL\n- Prestação do serviço (execução de contrato, Art. 7º, V, da LGPD): gestão de conta, criação de grupos de nado, descoberta de grupos\n- Notificações (consentimento, Art. 7º, I, da LGPD): notificações push sobre atualizações de grupos\n- Cumprimento de obrigação legal (Art. 7º, II, da LGPD): retenção de registros de consentimento\n\n4. TERCEIROS\n- Clerk (auth.clerk.com): autenticação e gestão de identidade. Seu e-mail e credenciais são processados pela Clerk conforme a Política de Privacidade dela.\n- Expo Push Notification Service (expo.dev): entrega de notificações push. Seu token push é transmitido aos servidores da Expo.\n- RevenueCat (revenuecat.com): gestão das assinaturas do plano Pro. Seu identificador de usuário e dados de compra são processados pela RevenueCat conforme a Política de Privacidade dela.\n- Supabase (supabase.com): hospedagem do banco de dados. Seus dados de conta, perfil e atividade são armazenados na infraestrutura da Supabase.\n- Fly.io (fly.io): hospedagem da API. Seus dados trafegam e são processados nos servidores da Fly.io.\n\n5. RETENÇÃO DE DADOS\nSeus dados são mantidos enquanto sua conta estiver ativa. Após a exclusão da conta, todos os dados pessoais são apagados permanentemente dos nossos sistemas em até 30 dias, exceto quando a retenção for exigida por lei.\n\n6. SEUS DIREITOS (LGPD, Art. 18)\nVocê tem o direito de:\n- Acessar seus dados pessoais (solicite uma cópia pelo recurso \"Exportar Meus Dados\")\n- Corrigir dados imprecisos (edite seu perfil a qualquer momento)\n- Apagar seus dados (\"Excluir Conta\" no seu perfil)\n- Portabilidade dos seus dados (exportação em JSON via \"Exportar Meus Dados\")\n- Retirar o consentimento a qualquer momento (não afeta o tratamento anterior)\n- Apresentar reclamação à Autoridade Nacional de Proteção de Dados (ANPD)\n\n7. SEGURANÇA\nUsamos HTTPS em toda a transmissão de dados. Tokens de autenticação nunca são registrados em log. As senhas têm hash feito pela Clerk e nunca são armazenadas por nós.\n\n8. CONTATO\nPara exercer seus direitos ou qualquer questão de privacidade: privacy@swim-buddy.com","es":"POLÍTICA DE PRIVACIDAD — SWIM BUDDY\n\nÚltima actualización: 4 de julio de 2026\n\n1. RESPONSABLE DEL TRATAMIENTO\nSwim Buddy (\"nosotros\", \"nuestro\") es el responsable del tratamiento de sus datos personales.\nContacto para solicitudes de datos: privacy@swim-buddy.com\n\n2. DATOS QUE RECOPILAMOS\n- Datos de cuenta: nombre, dirección de correo electrónico, contraseña (codificada por Clerk)\n- Datos de perfil: ciudad, región, país, bio\n- Datos de actividad: grupos de nado creados, grupos de nado a los que se unió, historial de asistencia, evaluación de asistencia\n- Datos del dispositivo: token de notificación push\n- Registros de consentimiento: marcas de tiempo de cuando aceptó esta política y los términos de uso\n\n3. PROPÓSITOS Y BASES LEGALES\n- Prestación del servicio (contrato, art. 6(1)(b) RGPD): gestión de cuenta, creación de grupos de nado, descubrimiento de grupos\n- Notificaciones (consentimiento, art. 6(1)(a)): notificaciones push para actualizaciones de grupos\n- Cumplimiento legal (art. 6(1)(c)): retención de registros de consentimiento\n\n4. TERCEROS\n- Clerk (auth.clerk.com): autenticación y gestión de identidad. Su correo electrónico y credenciales se procesan mediante Clerk según su Política de Privacidad.\n- Servicio de notificación push de Expo (expo.dev): entrega de notificaciones push. Su token push se transmite a los servidores de Expo.\n- RevenueCat (revenuecat.com): gestión de las suscripciones del plan Pro. Su identificador de usuario y datos de compra son procesados por RevenueCat según su propia Política de Privacidad.\n- Supabase (supabase.com): alojamiento de la base de datos. Sus datos de cuenta, perfil y actividad se almacenan en la infraestructura de Supabase.\n- Fly.io (fly.io): alojamiento de la API. Sus datos transitan y se procesan en los servidores de Fly.io.\n\n5. RETENCIÓN DE DATOS\nSus datos se retienen mientras su cuenta esté activa. Después de la eliminación de la cuenta, todos los datos personales se eliminan permanentemente de nuestros sistemas dentro de 30 días, excepto cuando la ley requiere la retención.\n\n6. SUS DERECHOS (RGPD art. 15–22)\nTiene derecho a:\n- Acceder a sus datos personales (solicitar una copia a través de la función \"Exportar mis datos\")\n- Rectificar datos inexactos (editar su perfil en cualquier momento)\n- Eliminar sus datos (\"Eliminar cuenta\" en su perfil)\n- Portabilidad de sus datos (exportación JSON a través de \"Exportar mis datos\")\n- Retirar el consentimiento en cualquier momento (no afecta el procesamiento anterior)\n- Presentar una queja ante su autoridad de control competente\n\n7. SEGURIDAD\nUtilizamos HTTPS para todas las transmisiones de datos. Los tokens de autenticación nunca se registran. Las contraseñas se codifican mediante Clerk y nunca las almacenamos.\n\n8. CONTACTO\nPara ejercer sus derechos o cualquier pregunta de privacidad: privacy@swim-buddy.com","de":"DATENSCHUTZRICHTLINIE — SWIM BUDDY\n\nZuletzt aktualisiert: 4. Juli 2026\n\n1. VERANTWORTLICHER\nSwim Buddy (\"wir\", \"uns\") ist der Verantwortliche für Ihre personenbezogenen Daten.\nKontakt für Datenanfragen: privacy@swim-buddy.com\n\n2. DATEN, DIE WIR SAMMELN\n- Kontodaten: Name, E-Mail-Adresse, Passwort (gehashed von Clerk)\n- Profildaten: Stadt, Bundesland, Land, Bio\n- Aktivitätsdaten: erstellte Schwimmgruppen, beigetretene Schwimmgruppen, Anwesenheitsverlauf, Anwesenheitsbewertung\n- Gerätedaten: Push-Benachrichtigungstoken\n- Zustimmungseinträge: Zeitstempel, wann Sie diese Richtlinie und die Nutzungsbedingungen akzeptiert haben\n\n3. ZWECKE UND RECHTSGRUNDLAGEN\n- Erbringung der Dienstleistung (Vertrag, Art. 6(1)(b) DSGVO): Kontoverwaltung, Erstellung von Schwimmgruppen, Gruppenentdeckung\n- Benachrichtigungen (Zustimmung, Art. 6(1)(a)): Push-Benachrichtigungen über Gruppenaktualisierungen\n- Einhaltung gesetzlicher Vorschriften (Art. 6(1)(c)): Aufbewahrung von Zustimmungseinträgen\n\n4. DRITTE\n- Clerk (auth.clerk.com): Authentifizierung und Identitätsverwaltung. Ihre E-Mail und Anmeldedaten werden von Clerk gemäß deren Datenschutzrichtlinie verarbeitet.\n- Expo Push Notification Service (expo.dev): Zustellung von Push-Benachrichtigungen. Ihr Push-Token wird an Expo-Server übertragen.\n- RevenueCat (revenuecat.com): Verwaltung der Pro-Abonnements. Ihre Benutzerkennung und Kaufdaten werden von RevenueCat gemäß deren Datenschutzrichtlinie verarbeitet.\n- Supabase (supabase.com): Datenbank-Hosting. Ihre Konto-, Profil- und Aktivitätsdaten werden auf der Supabase-Infrastruktur gespeichert.\n- Fly.io (fly.io): API-Hosting. Ihre Daten werden über Fly.io-Server übertragen und dort verarbeitet.\n\n5. DATENSPEICHERUNG\nIhre Daten werden gespeichert, solange Ihr Konto aktiv ist. Nach Kontolöschung werden alle personenbezogenen Daten innerhalb von 30 Tagen permanent aus unseren Systemen gelöscht, außer wenn die Aufbewahrung gesetzlich erforderlich ist.\n\n6. IHRE RECHTE (DSGVO Art. 15–22)\nSie haben das Recht:\n- Auf Zugriff auf Ihre personenbezogenen Daten (Kopie über die Funktion \"Meine Daten exportieren\" anfordern)\n- Auf Berichtigung ungenauer Daten (Profil jederzeit bearbeiten)\n- Auf Löschung Ihrer Daten (\"Konto löschen\" in Ihrem Profil)\n- Auf Datenportabilität (JSON-Export über \"Meine Daten exportieren\")\n- Widerspruch jederzeit einzulegen (beeinträchtigt nicht vorherige Verarbeitung)\n- Beschwerde bei Ihrer zuständigen Aufsichtsbehörde einzureichen\n\n7. SICHERHEIT\nWir verwenden HTTPS für alle Datenübertragungen. Authentifizierungstoken werden niemals protokolliert. Passwörter werden von Clerk gehashed und von uns niemals gespeichert.\n\n8. KONTAKT\nUm Ihre Rechte auszuüben oder bei Datenschutzfragen: privacy@swim-buddy.com","fr":"POLITIQUE DE CONFIDENTIALITÉ — SWIM BUDDY\n\nDernière mise à jour : 4 juillet 2026\n\n1. RESPONSABLE DU TRAITEMENT\nSwim Buddy (\"nous\", \"nos\") est le responsable du traitement de vos données personnelles.\nContact pour les demandes de données : privacy@swim-buddy.com\n\n2. DONNÉES QUE NOUS COLLECTONS\n- Données de compte : nom, adresse e-mail, mot de passe (haché par Clerk)\n- Données de profil : ville, région, pays, bio\n- Données d'activité : groupes de nage créés, groupes de nage rejoints, historique de présence, évaluation de présence\n- Données d'appareil : jeton de notification push\n- Enregistrements de consentement : horodatages du moment où vous avez accepté cette politique et les conditions d'utilisation\n\n3. FINALITÉS ET BASES JURIDIQUES\n- Fourniture du service (contrat, art. 6(1)(b) RGPD) : gestion de compte, création de groupes de nage, découverte de groupes\n- Notifications (consentement, art. 6(1)(a)) : notifications push pour les mises à jour de groupes\n- Conformité légale (art. 6(1)(c)) : conservation des enregistrements de consentement\n\n4. TIERS\n- Clerk (auth.clerk.com) : authentification et gestion d'identité. Votre e-mail et vos identifiants sont traités par Clerk selon leur politique de confidentialité.\n- Service de notification push Expo (expo.dev) : livraison des notifications push. Votre jeton push est transmis aux serveurs d'Expo.\n- RevenueCat (revenuecat.com) : gestion des abonnements au plan Pro. Votre identifiant utilisateur et vos données d'achat sont traités par RevenueCat selon sa propre politique de confidentialité.\n- Supabase (supabase.com) : hébergement de la base de données. Vos données de compte, de profil et d'activité sont stockées sur l'infrastructure Supabase.\n- Fly.io (fly.io) : hébergement de l'API. Vos données transitent par les serveurs de Fly.io et y sont traitées.\n\n5. CONSERVATION DES DONNÉES\nVos données sont conservées tant que votre compte est actif. Après suppression du compte, toutes les données personnelles sont définitivement supprimées de nos systèmes dans les 30 jours, sauf si la conservation est requise par la loi.\n\n6. VOS DROITS (RGPD art. 15–22)\nVous avez le droit :\n- D'accéder à vos données personnelles (demander une copie via la fonction \"Exporter mes données\")\n- De rectifier les données inexactes (modifier votre profil à tout moment)\n- De supprimer vos données (\"Supprimer le compte\" dans votre profil)\n- À la portabilité de vos données (export JSON via \"Exporter mes données\")\n- De retirer votre consentement à tout moment (n'affecte pas le traitement antérieur)\n- De déposer une plainte auprès de votre autorité de contrôle compétente\n\n7. SÉCURITÉ\nNous utilisons HTTPS pour toutes les transmissions de données. Les jetons d'authentification ne sont jamais enregistrés. Les mots de passe sont hachés par Clerk et ne sont jamais stockés par nous.\n\n8. CONTACT\nPour exercer vos droits ou pour toute question relative à la confidentialité : privacy@swim-buddy.com","it":"INFORMATIVA SULLA PRIVACY — SWIM BUDDY\n\nUltimo aggiornamento: 4 luglio 2026\n\n1. TITOLARE DEL TRATTAMENTO\nSwim Buddy (\"noi\", \"nostri\") è il titolare del trattamento responsabile dei tuoi dati personali.\nContatto per le richieste di dati: privacy@swim-buddy.com\n\n2. DATI CHE RACCOGLIAMO\n- Dati dell'account: nome, indirizzo e-mail, password (crittografata da Clerk)\n- Dati del profilo: città, regione, paese, bio\n- Dati di attività: gruppi di nuoto creati, gruppi di nuoto a cui sei entrato, cronologia della presenza, valutazione della presenza\n- Dati del dispositivo: token di notifica push\n- Record di consenso: timestamp di quando hai accettato questa informativa e i termini di utilizzo\n\n3. FINALITÀ E BASI LEGALI\n- Fornitura del servizio (contratto, art. 6(1)(b) GDPR): gestione account, creazione di gruppi di nuoto, scoperta di gruppi\n- Notifiche (consenso, art. 6(1)(a)): notifiche push per gli aggiornamenti dei gruppi\n- Conformità legale (art. 6(1)(c)): conservazione dei record di consenso\n\n4. TERZE PARTI\n- Clerk (auth.clerk.com): autenticazione e gestione dell'identità. La tua e-mail e le tue credenziali sono elaborate da Clerk secondo la loro informativa sulla privacy.\n- Servizio di notifica push Expo (expo.dev): consegna delle notifiche push. Il tuo token push viene trasmesso ai server di Expo.\n- RevenueCat (revenuecat.com): gestione degli abbonamenti al piano Pro. Il tuo identificativo utente e i dati di acquisto sono elaborati da RevenueCat secondo la loro informativa sulla privacy.\n- Supabase (supabase.com): hosting del database. I tuoi dati di account, profilo e attività sono archiviati sull'infrastruttura Supabase.\n- Fly.io (fly.io): hosting dell'API. I tuoi dati transitano e vengono elaborati sui server di Fly.io.\n\n5. CONSERVAZIONE DEI DATI\nI tuoi dati vengono conservati finché il tuo account è attivo. Dopo l'eliminazione dell'account, tutti i dati personali vengono eliminati definitivamente dai nostri sistemi entro 30 giorni, tranne quando la conservazione è richiesta dalla legge.\n\n6. TUOI DIRITTI (GDPR art. 15–22)\nHai il diritto di:\n- Accedere ai tuoi dati personali (richiedere una copia tramite la funzione \"Esporta i miei dati\")\n- Rettificare dati inesatti (modifica il tuo profilo in qualsiasi momento)\n- Cancellare i tuoi dati (\"Elimina account\" nel tuo profilo)\n- Portabilità dei tuoi dati (esportazione JSON tramite \"Esporta i miei dati\")\n- Ritirare il consenso in qualsiasi momento (non influisce sul trattamento precedente)\n- Presentare un reclamo alla tua autorità di controllo competente\n\n7. SICUREZZA\nUtilizziamo HTTPS per tutte le trasmissioni di dati. I token di autenticazione non vengono mai registrati. Le password vengono crittografate da Clerk e non vengono mai archiviate da noi.\n\n8. CONTATTO\nPer esercitare i tuoi diritti o per qualsiasi domanda sulla privacy: privacy@swim-buddy.com","hu":"ADATVÉDELMI NYILATKOZAT — SWIM BUDDY\n\nUtolsó frissítés: 2026. július 4.\n\n1. ADATKEZELŐ\nA Swim Buddy (\"mi\", \"miénk\") az Ön személyes adatainak felelős adatkezelője.\nKapcsolat az adatkérésekhez: privacy@swim-buddy.com\n\n2. ÖSSZEGYŰJTÖTT ADATOK\n- Fiókadatok: név, e-mail cím, jelszó (Clerk által titkosított)\n- Profiladatok: város, régió, ország, bio\n- Aktivitási adatok: létrehozott úszócsoportok, csatlakozott úszócsoportok, jelenléti előzmények, jelenléti értékelés\n- Eszközadatok: push értesítési token\n- Hozzájárulási nyilvántartások: időbélyegek, amikor elfogadta ezt az irányelvet és a felhasználási feltételeket\n\n3. CÉLOK ÉS JOGI ALAPOK\n- Szolgáltatás nyújtása (szerződés, 6. cikk (1) b) GDPR): fiókkezelés, úszócsoport létrehozása, csoportfelfedezés\n- Értesítések (hozzájárulás, 6. cikk (1) a) GDPR): push értesítések a csoportok frissítéseiről\n- Jogi megfelelés (6. cikk (1) c) GDPR): hozzájárulási nyilvántartások megőrzése\n\n4. HARMADIK FELEK\n- Clerk (auth.clerk.com): hitelesítés és identitáskezelés. E-mail-je és hitelesítési adatai a Clerk adatvédelmi nyilatkozata szerint kerülnek feldolgozásra.\n- Expo Push Notification Service (expo.dev): push értesítések kézbesítése. Az Ön push tokenje az Expo szervereire kerül továbbításra.\n- RevenueCat (revenuecat.com): a Pro előfizetések kezelése. Az Ön felhasználói azonosítóját és vásárlási adatait a RevenueCat a saját adatvédelmi nyilatkozata szerint dolgozza fel.\n- Supabase (supabase.com): adatbázis-tárhely. Fiók-, profil- és aktivitási adatai a Supabase infrastruktúráján kerülnek tárolásra.\n- Fly.io (fly.io): API-tárhely. Adatai a Fly.io szerverein keresztül haladnak és ott kerülnek feldolgozásra.\n\n5. ADATOK MEGŐRZÉSE\nAdatai mindaddig megőrzésre kerülnek, amíg fiókja aktív. A fiók törlése után az összes személyes adat véglegesen törlésre kerül rendszereinkből 30 napon belül, kivéve, ha a törvény megköveteli az adatok megőrzését.\n\n6. AZ ÖN JOGAI (GDPR 15–22. cikk)\nJogában áll:\n- Hozzáférni személyes adataihoz (másolat igénylése az \"Adataim exportálása\" funkcióval)\n- Pontatlan adatok helyesbítése (profilja bármikor szerkeszthető)\n- Adatai törlése (\"Fiók törlése\" a profilon)\n- Adatok hordozhatósága (JSON-export az \"Adataim exportálása\" opcióval)\n- Hozzájárulás visszavonása bármikor (nem érinti az előzetes feldolgozást)\n- Panaszt tenni az illetékes felügyeleti hatóságnál\n\n7. BIZTONSÁG\nAz összes adatátvitelhez HTTPS-t használunk. A hitelesítési tokenek soha nem kerülnek naplózásra. A jelszavak titkosítása a Clerk végzi, és mi soha nem tároljuk azokat.\n\n8. KAPCSOLAT\nJogai gyakorlásához vagy adatvédelmi kérdésekhez: privacy@swim-buddy.com","zh":"隐私政策 — SWIM BUDDY\n\n最后更新：2026年7月4日\n\n1. 控制者\nSwim Buddy（\"我们\"）是负责您个人数据的数据控制者。\n数据请求联系方式：privacy@swim-buddy.com\n\n2. 我们收集的数据\n- 账户数据：姓名、电子邮件地址、密码（由Clerk进行哈希处理）\n- 个人资料数据：城市、州、国家、简介\n- 活动数据：创建的游泳小组、加入的游泳小组、出席记录、出席评分\n- 设备数据：推送通知令牌\n- 同意记录：您接受本政策和使用条款时的时间戳\n\n3. 处理目的和法律依据\n- 提供服务（合同，GDPR第6(1)(b)条）：账户管理、游泳小组创建、小组发现\n- 通知（同意，GDPR第6(1)(a)条）：关于小组更新的推送通知\n- 法律合规（GDPR第6(1)(c)条）：保留同意记录\n\n4. 第三方\n- Clerk（auth.clerk.com）：身份验证和身份管理。您的电子邮件和凭据由Clerk根据其隐私政策处理。\n- Expo推送通知服务（expo.dev）：推送通知的传递。您的推送令牌被传输到Expo的服务器。\n- RevenueCat（revenuecat.com）：Pro订阅管理。您的用户标识符和购买数据由RevenueCat根据其隐私政策处理。\n- Supabase（supabase.com）：数据库托管。您的账户、个人资料和活动数据存储在Supabase基础设施上。\n- Fly.io（fly.io）：API托管。您的数据经由Fly.io服务器传输和处理。\n\n5. 数据保留\n您的数据在您的账户活跃期间保留。删除账户后，所有个人数据将在30天内从我们的系统中永久删除，除非法律要求保留。\n\n6. 您的权利（GDPR第15–22条）\n您有权：\n- 访问您的个人数据（通过\"导出我的数据\"功能请求副本）\n- 更正不准确的数据（随时编辑您的个人资料）\n- 删除您的数据（在您的个人资料中\"删除账户\"）\n- 数据可携性（通过\"导出我的数据\"进行JSON导出）\n- 随时撤回同意（不影响之前的处理）\n- 向您的主管部门提出投诉\n\n7. 安全\n我们对所有数据传输使用HTTPS。身份验证令牌不记录。密码由Clerk进行哈希处理，不由我们存储。\n\n8. 联系方式\n如要行使您的权利或有任何隐私问题：privacy@swim-buddy.com","hi":"गोपनीयता नीति — SWIM BUDDY\n\nअंतिम अद्यतन: 4 जुलाई 2026\n\n1. नियंत्रक\nSwim Buddy (\"हम\") आपके व्यक्तिगत डेटा के लिए जिम्मेदार डेटा नियंत्रक है।\nडेटा अनुरोधों के लिए संपर्क: privacy@swim-buddy.com\n\n2. हम जो डेटा एकत्र करते हैं\n- खाता डेटा: नाम, ईमेल पता, पासवर्ड (Clerk द्वारा हैश किया गया)\n- प्रोफ़ाइल डेटा: शहर, राज्य, देश, जीवनी\n- गतिविधि डेटा: बनाए गए तैराकी समूह, शामिल तैराकी समूह, उपस्थिति रिकॉर्ड, उपस्थिति रेटिंग\n- डिवाइस डेटा: पुश नोटिफिकेशन टोकन\n- सहमति रिकॉर्ड: जब आपने इस नीति और उपयोग की शर्तों को स्वीकार किया उसका समय\n\n3. उद्देश्य और कानूनी आधार\n- सेवा प्रदान (अनुबंध, GDPR अनुच्छेद 6(1)(b)): खाता प्रबंधन, तैराकी समूह निर्माण, समूह खोज\n- सूचनाएं (सहमति, GDPR अनुच्छेद 6(1)(a)): समूह अपडेट के बारे में पुश सूचनाएं\n- कानूनी अनुपालन (GDPR अनुच्छेद 6(1)(c)): सहमति रिकॉर्ड का संरक्षण\n\n4. तीसरे पक्ष\n- Clerk (auth.clerk.com): प्रमाणीकरण और पहचान प्रबंधन। आपका ईमेल और साख Clerk द्वारा उनकी गोपनीयता नीति के अनुसार संसाधित किए जाते हैं।\n- Expo पुश नोटिफिकेशन सेवा (expo.dev): पुश सूचनाओं की डिलीवरी। आपका पुश टोकन Expo सर्वर को प्रेषित किया जाता है।\n- RevenueCat (revenuecat.com): Pro योजना की सदस्यता का प्रबंधन। आपका उपयोगकर्ता पहचानकर्ता और खरीद डेटा RevenueCat द्वारा उनकी गोपनीयता नीति के अनुसार संसाधित किए जाते हैं।\n- Supabase (supabase.com): डेटाबेस होस्टिंग। आपका खाता, प्रोफ़ाइल और गतिविधि डेटा Supabase इन्फ्रास्ट्रक्चर पर संग्रहीत होता है।\n- Fly.io (fly.io): API होस्टिंग। आपका डेटा Fly.io सर्वर से गुजरता है और वहां संसाधित होता है।\n\n5. डेटा प्रतिधारण\nआपके डेटा को आपके खाते के सक्रिय रहने तक संरक्षित रखा जाता है। खाता हटाने के बाद, सभी व्यक्तिगत डेटा 30 दिनों में हमारी प्रणालियों से स्थायी रूप से मिटा दिया जाता है, सिवाय जब कानून द्वारा प्रतिधारण की आवश्यकता हो।\n\n6. आपके अधिकार (GDPR अनुच्छेद 15–22)\nआपको अधिकार है:\n- अपने व्यक्तिगत डेटा तक पहुंचना (\"मेरा डेटा निर्यात करें\" के माध्यम से कॉपी का अनुरोध करें)\n- गलत डेटा को सही करना (किसी भी समय अपनी प्रोफ़ाइल संपादित करें)\n- अपने डेटा को हटाना (अपनी प्रोफ़ाइल में \"खाता हटाएं\")\n- आपके डेटा की पोर्टेबिलिटी (\"मेरा डेटा निर्यात करें\" के माध्यम से JSON निर्यात)\n- किसी भी समय सहमति वापस लेना (पूर्व प्रसंस्करण को प्रभावित नहीं करता)\n- अपने सक्षम प्राधिकारी के पास शिकायत दर्ज करना\n\n7. सुरक्षा\nहम सभी डेटा ट्रांसमिशन के लिए HTTPS का उपयोग करते हैं। प्रमाणीकरण टोकन कभी लॉग नहीं किए जाते। पासवर्ड Clerk द्वारा हैश किए जाते हैं और हमारे द्वारा कभी संग्रहीत नहीं किए जाते।\n\n8. संपर्क\nअपने अधिकारों का प्रयोग करने या किसी भी गोपनीयता प्रश्न के लिए: privacy@swim-buddy.com","bn":"গোপনীয়তা নীতি — SWIM BUDDY\n\nসর্বশেষ আপডেট: 4 জুলাই 2026\n\n1. নিয়ন্ত্রক\nSwim Buddy (\"আমরা\") আপনার ব্যক্তিগত ডেটার জন্য দায়বদ্ধ ডেটা নিয়ন্ত্রক।\nডেটা অনুরোধের জন্য যোগাযোগ: privacy@swim-buddy.com\n\n2. আমরা যে ডেটা সংগ্রহ করি\n- অ্যাকাউন্ট ডেটা: নাম, ইমেল ঠিকানা, পাসওয়ার্ড (Clerk দ্বারা হ্যাশ করা)\n- প্রোফাইল ডেটা: শহর, অঞ্চল, দেশ, জীবনী\n- কার্যকলাপ ডেটা: তৈরি করা সাঁতারের গ্রুপ, যোগদান করা সাঁতারের গ্রুপ, উপস্থিতি রেকর্ড, উপস্থিতি রেটিং\n- ডিভাইস ডেটা: পুশ বিজ্ঞপ্তি টোকেন\n- সম্মতি রেকর্ড: যখন আপনি এই নীতি এবং ব্যবহারের শর্তাবলী গ্রহণ করেছিলেন তার সময়কাল\n\n3. উদ্দেশ্য এবং আইনি ভিত্তি\n- সেবা প্রদান (চুক্তি, GDPR অনুচ্ছেদ 6(1)(b)): অ্যাকাউন্ট পরিচালনা, সাঁতারের গ্রুপ তৈরি, গ্রুপ আবিষ্কার\n- বিজ্ঞপ্তি (সম্মতি, GDPR অনুচ্ছেদ 6(1)(a)): গ্রুপ আপডেটের বিষয়ে পুশ বিজ্ঞপ্তি\n- আইনি সম্মতি (GDPR অনুচ্ছেদ 6(1)(c)): সম্মতি রেকর্ড সংরক্ষণ\n\n4. তৃতীয় পক্ষ\n- Clerk (auth.clerk.com): প্রমাণীকরণ এবং পরিচয় ব্যবস্থাপনা। আপনার ইমেল এবং শংসাপত্র Clerk দ্বারা তাদের গোপনীয়তা নীতি অনুযায়ী প্রক্রিয়া করা হয়।\n- Expo পুশ বিজ্ঞপ্তি সেবা (expo.dev): পুশ বিজ্ঞপ্তির সরবরাহ। আপনার পুশ টোকেন Expo সার্ভারে প্রেরণ করা হয়।\n- RevenueCat (revenuecat.com): Pro প্ল্যানের সাবস্ক্রিপশন ব্যবস্থাপনা। আপনার ব্যবহারকারী শনাক্তকারী এবং ক্রয় ডেটা RevenueCat তাদের গোপনীয়তা নীতি অনুযায়ী প্রক্রিয়া করে।\n- Supabase (supabase.com): ডেটাবেস হোস্টিং। আপনার অ্যাকাউন্ট, প্রোফাইল এবং কার্যকলাপ ডেটা Supabase অবকাঠামোতে সংরক্ষিত হয়।\n- Fly.io (fly.io): API হোস্টিং। আপনার ডেটা Fly.io সার্ভারের মাধ্যমে স্থানান্তরিত এবং প্রক্রিয়া করা হয়।\n\n5. ডেটা ধারণ\nআপনার ডেটা আপনার অ্যাকাউন্ট সক্রিয় থাকার সময় ধরে রাখা হয়। অ্যাকাউন্ট মুছে ফেলার পরে, সমস্ত ব্যক্তিগত ডেটা 30 দিনের মধ্যে আমাদের সিস্টেম থেকে স্থায়ীভাবে মুছে ফেলা হয়, যদি না আইন দ্বারা ধারণের প্রয়োজন হয়।\n\n6. আপনার অধিকার (GDPR অনুচ্ছেদ 15–22)\nআপনার অধিকার রয়েছে:\n- আপনার ব্যক্তিগত ডেটায় অ্যাক্সেস করা (\"আমার ডেটা রপ্তানি করুন\" এর মাধ্যমে অনুরোধ করুন)\n- ভুল ডেটা সংশোধন করা (যে কোনো সময় আপনার প্রোফাইল সম্পাদনা করুন)\n- আপনার ডেটা মুছে ফেলা (আপনার প্রোফাইলে \"অ্যাকাউন্ট মুছুন\")\n- আপনার ডেটার পোর্টেবিলিটি (\"আমার ডেটা রপ্তানি করুন\" এর মাধ্যমে JSON রপ্তানি)\n- যে কোনো সময় সম্মতি প্রত্যাহার করা (পূর্ববর্তী প্রক্রিয়াকরণ প্রভাবিত করে না)\n- আপনার সক্ষম কর্তৃপক্ষের কাছে অভিযোগ করা\n\n7. নিরাপত্তা\nআমরা সমস্ত ডেটা ট্রান্সমিশনের জন্য HTTPS ব্যবহার করি। প্রমাণীকরণ টোকেন কখনই লগ করা হয় না। পাসওয়ার্ড Clerk দ্বারা হ্যাশ করা হয় এবং আমরা কখনই সংরক্ষণ করি না।\n\n8. যোগাযোগ\nআপনার অধিকার প্রয়োগ করতে বা কোনো গোপনীয়তা প্রশ্নের জন্য: privacy@swim-buddy.com","ru":"ПОЛИТИКА КОНФИДЕНЦИАЛЬНОСТИ — SWIM BUDDY\n\nПоследнее обновление: 4 июля 2026 г.\n\n1. КОНТРОЛЕР\nSwim Buddy (\"мы\") является ответственным лицом за обработку ваших персональных данных.\nКонтакт для запросов данных: privacy@swim-buddy.com\n\n2. СОБИРАЕМЫЕ ДАННЫЕ\n- Данные учетной записи: имя, адрес электронной почты, пароль (хешированный Clerk)\n- Данные профиля: город, область, страна, биография\n- Данные активности: созданные группы плавания, присоединенные группы плавания, история посещаемости, оценка присутствия\n- Данные устройства: токен push-уведомления\n- Записи согласия: временные метки принятия вами этой политики и условий использования\n\n3. ЦЕЛИ И ПРАВОВЫЕ ОСНОВАНИЯ\n- Предоставление услуги (договор, ст. 6(1)(b) GDPR): управление учетной записью, создание групп плавания, обнаружение групп\n- Уведомления (согласие, ст. 6(1)(a) GDPR): push-уведомления об обновлениях групп\n- Соответствие законодательству (ст. 6(1)(c) GDPR): хранение записей о согласии\n\n4. ТРЕТЬИ СТОРОНЫ\n- Clerk (auth.clerk.com): аутентификация и управление идентификацией. Ваша электронная почта и учетные данные обрабатываются Clerk в соответствии с их политикой конфиденциальности.\n- Сервис push-уведомлений Expo (expo.dev): доставка push-уведомлений. Ваш токен push передается на серверы Expo.\n- RevenueCat (revenuecat.com): управление подписками плана Pro. Ваш идентификатор пользователя и данные о покупках обрабатываются RevenueCat в соответствии с их политикой конфиденциальности.\n- Supabase (supabase.com): хостинг базы данных. Данные вашей учетной записи, профиля и активности хранятся в инфраструктуре Supabase.\n- Fly.io (fly.io): хостинг API. Ваши данные передаются через серверы Fly.io и обрабатываются на них.\n\n5. ХРАНЕНИЕ ДАННЫХ\nВаши данные хранятся, пока ваша учетная запись активна. После удаления учетной записи все персональные данные окончательно удаляются из наших систем в течение 30 дней, кроме случаев, когда закон требует их хранения.\n\n6. ВАШИ ПРАВА (GDPR ст. 15–22)\nУ вас есть право:\n- Получить доступ к вашим персональным данным (запросить копию через \"Экспорт моих данных\")\n- Исправить неточные данные (отредактировать профиль в любой момент)\n- Удалить ваши данные (\"Удалить учетную запись\" в вашем профиле)\n- Переносимость ваших данных (JSON-экспорт через \"Экспорт моих данных\")\n- Отозвать согласие в любой момент (не влияет на предыдущую обработку)\n- Подать жалобу в компетентный орган надзора\n\n7. БЕЗОПАСНОСТЬ\nМы используем HTTPS для всех передач данных. Токены аутентификации никогда не регистрируются. Пароли хешируются Clerk и никогда не сохраняются нами.\n\n8. КОНТАКТ\nДля осуществления ваших прав или любых вопросов конфиденциальности: privacy@swim-buddy.com","ja":"プライバシーポリシー — SWIM BUDDY\n\n最終更新日：2026年7月4日\n\n1. 管理者\nSwim Buddy（「当社」）はお客様の個人データを管理する責任のあるデータ管理者です。\nデータリクエストのお問い合わせ：privacy@swim-buddy.com\n\n2. 当社が収集するデータ\n- アカウントデータ：名前、メールアドレス、パスワード（Clerkによってハッシュ化）\n- プロフィールデータ：都市、州、国、自己紹介\n- アクティビティデータ：作成された水泳グループ、参加した水泳グループ、出席記録、出席評価\n- デバイスデータ：プッシュ通知トークン\n- 同意レコード：このポリシーと利用規約を受け入れた時刻\n\n3. 目的と法的根拠\n- サービス提供（契約、GDPR第6(1)(b)条）：アカウント管理、水泳グループ作成、グループ発見\n- 通知（同意、GDPR第6(1)(a)条）：グループ更新についてのプッシュ通知\n- 法的遵守（GDPR第6(1)(c)条）：同意レコードの保持\n\n4. 第三者\n- Clerk（auth.clerk.com）：認証と身元管理。お客様のメールと認証情報はClerkのプライバシーポリシーに従って処理されます。\n- Expoプッシュ通知サービス（expo.dev）：プッシュ通知の配信。お客様のプッシュトークンはExoサーバーに送信されます。\n- RevenueCat（revenuecat.com）：Proプランのサブスクリプション管理。お客様のユーザー識別子と購入データは、RevenueCatのプライバシーポリシーに従って処理されます。\n- Supabase（supabase.com）：データベースホスティング。お客様のアカウント、プロフィール、アクティビティデータはSupabaseのインフラに保存されます。\n- Fly.io（fly.io）：APIホスティング。お客様のデータはFly.ioのサーバーを経由して処理されます。\n\n5. データ保持\nお客様のデータはアカウントがアクティブな限り保持されます。アカウント削除後、すべての個人データは30日以内に当社システムから永久削除されます。ただし、法律により保持が必要な場合は除きます。\n\n6. お客様の権利（GDPR第15～22条）\nお客様には以下の権利があります：\n- 個人データへのアクセス（「マイデータをエクスポート」機能でコピーを要求）\n- 不正確なデータの修正（プロフィールをいつでも編集）\n- お客様のデータの削除（プロフィールの「アカウント削除」）\n- データの可搬性（「マイデータをエクスポート」のJSONエクスポート）\n- 同意をいつでも撤回（以前の処理には影響しない）\n- 管轄当局に苦情を申し立てる\n\n7. セキュリティ\n当社はすべてのデータ送信にHTTPSを使用します。認証トークンは記録されません。パスワードはClerkによってハッシュ化され、当社では保存されません。\n\n8. お問い合わせ\nお客様の権利を行使するまたはプライバシーに関するご質問：privacy@swim-buddy.com","tr":"GİZLİLİK POLİTİKASI — SWIM BUDDY\n\nSon güncelleme: 4 Temmuz 2026\n\n1. SORUMLU KIŞI\nSwim Buddy (\"biz\"), kişisel verilerinizden sorumlu veri denetleyicisidir.\nVeri istekleri için iletişim: privacy@swim-buddy.com\n\n2. TOPLADĞIMIZ VERİLER\n- Hesap verileri: ad, e-posta adresi, şifre (Clerk tarafından şifrelenen)\n- Profil verileri: şehir, bölge, ülke, biyografi\n- Aktivite verileri: oluşturulan yüzme grupları, katılınan yüzme grupları, katılım kaydı, katılım değerlendirmesi\n- Cihaz verileri: push bildirimi jetonu\n- İzin kayıtları: bu politika ve kullanım koşullarını kabul ettiğiniz zaman damgaları\n\n3. AMAÇLAR VE YASAL TEMELLER\n- Hizmet sağlama (sözleşme, GDPR m. 6(1)(b)): hesap yönetimi, yüzme grubu oluşturma, grup keşfi\n- Bildirimler (izin, GDPR m. 6(1)(a)): grup güncellemeleri hakkında push bildirimleri\n- Yasal uyum (GDPR m. 6(1)(c)): izin kayıtlarının tutulması\n\n4. ÜÇÜNCÜ TARAFLAR\n- Clerk (auth.clerk.com): kimlik doğrulama ve kimlik yönetimi. E-postanız ve kimlik bilgileriniz Clerk tarafından kendi Gizlilik Politikasına göre işlenir.\n- Expo Push Bildirimi Hizmeti (expo.dev): push bildirimlerinin iletimi. Push jetonunuz Expo sunucularına iletilir.\n- RevenueCat (revenuecat.com): Pro plan aboneliklerinin yönetimi. Kullanıcı tanımlayıcınız ve satın alma verileriniz RevenueCat tarafından kendi Gizlilik Politikasına göre işlenir.\n- Supabase (supabase.com): veritabanı barındırma. Hesap, profil ve etkinlik verileriniz Supabase altyapısında saklanır.\n- Fly.io (fly.io): API barındırma. Verileriniz Fly.io sunucuları üzerinden iletilir ve orada işlenir.\n\n5. VERİ SAKLAMASI\nVerileriniz hesabınız aktif olduğu sürece tutulur. Hesabı sildikten sonra, tüm kişisel veriler 30 gün içinde sistemlerimizden kalıcı olarak silinir; kanun saklama gerektirmediği sürece.\n\n6. HAKLARINız (GDPR m. 15–22)\nHaklarınız vardır:\n- Kişisel verilerinize erişme (Verilerim'i Dışa Aktar aracılığıyla kopyasını isteme)\n- Yanlış verileri düzeltme (profilinizi istediğiniz zaman düzenleme)\n- Verilerinizi silme (profilinizde \"Hesabı Sil\")\n- Verilerinizin taşınabilirliği (\"Verilerim'i Dışa Aktar\" aracılığıyla JSON dışa aktarması)\n- İzni istediğiniz zaman geri alma (önceki işlemeyi etkilemez)\n- Yetkili makamlara şikayet başvurusu yapma\n\n7. GÜVENLİK\nTüm veri aktarımları için HTTPS kullanırız. Kimlik doğrulama jetonları hiç kaydedilmez. Şifreler Clerk tarafından şifrelenir ve biz tarafından hiç saklanmaz.\n\n8. İLETİŞİM\nHaklarınızı kullanmak veya gizlilik soruları için: privacy@swim-buddy.com","ko":"개인정보 보호정책 — SWIM BUDDY\n\n마지막 업데이트: 2026년 7월 4일\n\n1. 관리자\nSwim Buddy(\"우리\")는 귀하의 개인 정보를 관리하는 책임이 있는 데이터 관리자입니다.\n데이터 요청 연락처: privacy@swim-buddy.com\n\n2. 수집하는 데이터\n- 계정 데이터: 이름, 이메일 주소, 비밀번호(Clerk에 의해 해시됨)\n- 프로필 데이터: 도시, 주/도, 국가, 자기소개\n- 활동 데이터: 생성된 수영 그룹, 참가한 수영 그룹, 출석 기록, 출석 평가\n- 기기 데이터: 푸시 알림 토큰\n- 동의 기록: 본 정책과 이용 약관을 수락한 시간\n\n3. 처리 목적 및 법적 근거\n- 서비스 제공(계약, GDPR 제6(1)(b)조): 계정 관리, 수영 그룹 생성, 그룹 검색\n- 알림(동의, GDPR 제6(1)(a)조): 그룹 업데이트에 대한 푸시 알림\n- 법적 준수(GDPR 제6(1)(c)조): 동의 기록 보존\n\n4. 제3자\n- Clerk(auth.clerk.com): 인증 및 신원 관리. 귀하의 이메일과 자격 증명은 Clerk의 개인정보 보호정책에 따라 처리됩니다.\n- Expo 푸시 알림 서비스(expo.dev): 푸시 알림 전달. 귀하의 푸시 토큰은 Expo 서버로 전송됩니다.\n- RevenueCat(revenuecat.com): Pro 플랜 구독 관리. 귀하의 사용자 식별자와 구매 데이터는 RevenueCat의 개인정보 보호정책에 따라 처리됩니다.\n- Supabase(supabase.com): 데이터베이스 호스팅. 귀하의 계정, 프로필 및 활동 데이터는 Supabase 인프라에 저장됩니다.\n- Fly.io(fly.io): API 호스팅. 귀하의 데이터는 Fly.io 서버를 통해 전송되고 처리됩니다.\n\n5. 데이터 보존\n귀하의 데이터는 계정이 활성화된 동안 보존됩니다. 계정을 삭제한 후 모든 개인 데이터는 30일 내에 당사 시스템에서 영구적으로 삭제되며, 법에서 보존이 필요한 경우는 제외됩니다.\n\n6. 귀하의 권리(GDPR 제15–22조)\n귀하는 다음과 같은 권리가 있습니다:\n- 개인 데이터에 대한 접근(\"내 데이터 내보내기\" 기능을 통해 사본 요청)\n- 부정확한 데이터 수정(언제든지 프로필 편집)\n- 귀하의 데이터 삭제(프로필에서 \"계정 삭제\")\n- 귀하의 데이터 이동성(\"내 데이터 내보내기\"를 통한 JSON 내보내기)\n- 언제든지 동의 철회(이전 처리에 영향을 주지 않음)\n- 관할 당국에 불만 제기\n\n7. 보안\n당사는 모든 데이터 전송에 HTTPS를 사용합니다. 인증 토큰은 절대 기록되지 않습니다. 비밀번호는 Clerk에 의해 해시되며 당사에서는 저장되지 않습니다.\n\n8. 연락처\n귀하의 권리를 행사하거나 개인정보 보호 관련 질문이 있으신 경우: privacy@swim-buddy.com","vi":"CHÍNH SÁCH BẢO MẬT — SWIM BUDDY\n\nCập nhật lần cuối: 4 tháng 7 năm 2026\n\n1. BÊN KIỂM SOÁT\nSwim Buddy (\"chúng tôi\") là bên kiểm soát dữ liệu chịu trách nhiệm về dữ liệu cá nhân của bạn.\nLiên hệ yêu cầu dữ liệu: privacy@swim-buddy.com\n\n2. DỮ LIỆU CHÚNG TÔI THU THẬP\n- Dữ liệu tài khoản: tên, địa chỉ email, mật khẩu (được mã hóa bởi Clerk)\n- Dữ liệu hồ sơ: thành phố, bang, quốc gia, tiểu sử\n- Dữ liệu hoạt động: nhóm bơi được tạo, nhóm bơi đã tham gia, lịch sử tham dự, đánh giá tham dự\n- Dữ liệu thiết bị: token thông báo đẩy\n- Bản ghi đồng ý: dấu thời gian khi bạn chấp nhận chính sách này và điều khoản sử dụng\n\n3. MỤC ĐÍCH VÀ CƠ SỞ PHÁP LÝ\n- Cung cấp dịch vụ (hợp đồng, Điều 6(1)(b) GDPR): quản lý tài khoản, tạo nhóm bơi, khám phá nhóm\n- Thông báo (sự đồng ý, Điều 6(1)(a) GDPR): thông báo đẩy về cập nhật nhóm\n- Tuân thủ pháp luật (Điều 6(1)(c) GDPR): lưu giữ bản ghi đồng ý\n\n4. BÊN THỨ BA\n- Clerk (auth.clerk.com): xác thực và quản lý danh tính. Email và thông tin xác thực của bạn được Clerk xử lý theo chính sách bảo mật của họ.\n- Dịch vụ thông báo đẩy Expo (expo.dev): cung cấp thông báo đẩy. Token đẩy của bạn được truyền tới máy chủ Expo.\n- RevenueCat (revenuecat.com): quản lý đăng ký gói Pro. Mã định danh người dùng và dữ liệu mua hàng của bạn được RevenueCat xử lý theo chính sách bảo mật của họ.\n- Supabase (supabase.com): lưu trữ cơ sở dữ liệu. Dữ liệu tài khoản, hồ sơ và hoạt động của bạn được lưu trữ trên hạ tầng Supabase.\n- Fly.io (fly.io): lưu trữ API. Dữ liệu của bạn được truyền qua và xử lý trên máy chủ Fly.io.\n\n5. LƯU GIỮ DỮ LIỆU\nDữ liệu của bạn được giữ lại miễn là tài khoản của bạn đang hoạt động. Sau khi xóa tài khoản, tất cả dữ liệu cá nhân sẽ bị xóa vĩnh viễn khỏi hệ thống của chúng tôi trong vòng 30 ngày, trừ khi pháp luật yêu cầu lưu giữ.\n\n6. QUYỀN CỦA BẠN (GDPR Điều 15–22)\nBạn có quyền:\n- Truy cập dữ liệu cá nhân của mình (yêu cầu sao chép qua tính năng \"Xuất dữ liệu của tôi\")\n- Sửa dữ liệu không chính xác (chỉnh sửa hồ sơ của bạn bất kỳ lúc nào)\n- Xóa dữ liệu của bạn (\"Xóa tài khoản\" trong hồ sơ của bạn)\n- Tính di động của dữ liệu của bạn (xuất JSON qua \"Xuất dữ liệu của tôi\")\n- Rút lại sự đồng ý bất kỳ lúc nào (không ảnh hưởng đến xử lý trước)\n- Nộp đơn khiếu nại với cơ quan giám sát có thẩm quyền\n\n7. BẢO MẬT\nChúng tôi sử dụng HTTPS cho tất cả các truyền dữ liệu. Token xác thực không bao giờ được ghi lại. Mật khẩu được mã hóa bởi Clerk và không bao giờ được chúng tôi lưu trữ.\n\n8. LIÊN HỆ\nĐể thực hiện các quyền của bạn hoặc có bất kỳ câu hỏi nào về bảo mật: privacy@swim-buddy.com","pl":"POLITYKA PRYWATNOŚCI — SWIM BUDDY\n\nOstatnia aktualizacja: 4 lipca 2026\n\n1. ADMINISTRATOR\nSwim Buddy (\"my\") jest administratorem danych odpowiedzialnym za Twoje dane osobowe.\nKontakt do wniosków o dane: privacy@swim-buddy.com\n\n2. ZBIERANE DANE\n- Dane konta: imię, adres e-mail, hasło (zahaszowane przez Clerk)\n- Dane profilu: miasto, region, kraj, biografia\n- Dane aktywności: utworzone grupy pływackie, dołączone grupy pływackie, historia obecności, ocena obecności\n- Dane urządzenia: token powiadomienia push\n- Rejestr zgody: sygnatury czasowe, kiedy zaakceptowałeś tę politykę i warunki użytkowania\n\n3. CELE I PODSTAWY PRAWNE\n- Świadczenie usługi (umowa, art. 6 ust. 1 lit. b RODO): zarządzanie kontem, tworzenie grup pływackich, odkrywanie grup\n- Powiadomienia (zgoda, art. 6 ust. 1 lit. a RODO): powiadomienia push o aktualizacjach grup\n- Zgodność prawna (art. 6 ust. 1 lit. c RODO): przechowywanie rejestrów zgody\n\n4. STRONY TRZECIE\n- Clerk (auth.clerk.com): uwierzytelnianie i zarządzanie tożsamością. Twój e-mail i poświadczenia są przetwarzane przez Clerk zgodnie z jego Polityką Prywatności.\n- Usługa powiadomień push Expo (expo.dev): dostarczanie powiadomień push. Twój token push jest przesyłany do serwerów Expo.\n- RevenueCat (revenuecat.com): zarządzanie subskrypcjami planu Pro. Twój identyfikator użytkownika i dane zakupowe są przetwarzane przez RevenueCat zgodnie z jego Polityką Prywatności.\n- Supabase (supabase.com): hosting bazy danych. Dane Twojego konta, profilu i aktywności są przechowywane w infrastrukturze Supabase.\n- Fly.io (fly.io): hosting API. Twoje dane są przesyłane przez serwery Fly.io i tam przetwarzane.\n\n5. PRZECHOWYWANIE DANYCH\nTwoje dane są przechowywane, dopóki Twoje konto jest aktywne. Po usunięciu konta wszystkie dane osobowe są trwale usuwane z naszych systemów w ciągu 30 dni, chyba że prawo wymaga ich przechowywania.\n\n6. TWOJE PRAWA (RODO art. 15–22)\nMasz prawo do:\n- Dostępu do swoich danych osobowych (poproś o kopię za pomocą funkcji \"Eksportuj moje dane\")\n- Sprostowania niedokładnych danych (edytuj swój profil w dowolnym momencie)\n- Usunięcia swoich danych (\"Usuń konto\" w swoim profilu)\n- Przenoszalności swoich danych (export JSON za pomocą \"Eksportuj moje dane\")\n- Wycofania zgody w dowolnym momencie (nie wpływa na poprzednie przetwarzanie)\n- Złożenia skargi do właściwego organu nadzorczego\n\n7. BEZPIECZEŃSTWO\nUżywamy HTTPS dla wszystkich transmisji danych. Tokeny uwierzytelniania nigdy nie są rejestrowane. Hasła są zahaszowane przez Clerk i nigdy nie są przez nas przechowywane.\n\n8. KONTAKT\nAby wykonać swoje prawa lub zadać jakiekolwiek pytania dotyczące prywatności: privacy@swim-buddy.com","nl":"PRIVACYBELEID — SWIM BUDDY\n\nLaatst bijgewerkt: 4 juli 2026\n\n1. VERWERKINGSVERANTWOORDELIJKE\nSwim Buddy (\"wij\") is de verwerkingsverantwoordelijke voor uw persoonsgegevens.\nContact voor gegevensverzoeken: privacy@swim-buddy.com\n\n2. GEGEVENS DIE WE VERZAMELEN\n- Accountgegevens: naam, e-mailadres, wachtwoord (gehasht door Clerk)\n- Profielgegevens: stad, regio, land, biografie\n- Activiteitsgegevens: gemaakte zwemgroepen, deelgenomen zwemgroepen, aanwezigheidsgeschiedenis, aanwezigingsbeoordeling\n- Apparaatgegevens: push-notificatietoken\n- Toestemmingsrecords: tijdstempels wanneer u dit beleid en de gebruiksvoorwaarden hebt geaccepteerd\n\n3. VERWERKINGSDOELEINDEN EN RECHTSBASIS\n- Verlening van de dienst (contract, GDPR artikel 6(1)(b)): accountbeheer, creatie van zwemgroepen, groepsontdekking\n- Meldingen (toestemming, GDPR artikel 6(1)(a)): push-meldingen over groepsupdates\n- Naleving van de wet (GDPR artikel 6(1)(c)): bewaring van toestemmingsrecords\n\n4. DERDEN\n- Clerk (auth.clerk.com): verificatie en identiteitsbeheer. Uw e-mail en referenties worden verwerkt door Clerk volgens hun privacybeleid.\n- Expo Push Notification Service (expo.dev): aflevering van push-meldingen. Uw push-token wordt naar Expo-servers verzonden.\n- RevenueCat (revenuecat.com): beheer van Pro-abonnementen. Uw gebruikers-ID en aankoopgegevens worden door RevenueCat verwerkt volgens hun eigen privacybeleid.\n- Supabase (supabase.com): databasehosting. Uw account-, profiel- en activiteitsgegevens worden opgeslagen op de Supabase-infrastructuur.\n- Fly.io (fly.io): API-hosting. Uw gegevens passeren en worden verwerkt op Fly.io-servers.\n\n5. GEGEVENSBEWARING\nUw gegevens worden bewaard zolang uw account actief is. Na accountverwijdering worden alle persoonsgegevens permanent uit onze systemen verwijderd binnen 30 dagen, tenzij wettelijk bewaring is vereist.\n\n6. UW RECHTEN (GDPR artikel 15–22)\nU hebt het recht op:\n- Toegang tot uw persoonsgegevens (vraag een kopie aan via de functie \"Mijn gegevens exporteren\")\n- Rectificatie van onjuiste gegevens (bewerk uw profiel op elk moment)\n- Verwijdering van uw gegevens (\"Account verwijderen\" in uw profiel)\n- Overdraagbaarheid van uw gegevens (JSON-export via \"Mijn gegevens exporteren\")\n- Intrekking van toestemming op elk moment (beïnvloedt niet eerdere verwerking)\n- Indienen van een klacht bij de bevoegde toezichthoudende autoriteit\n\n7. BEVEILIGING\nWe gebruiken HTTPS voor alle gegevensoverdracht. Verificatietokens worden nooit geregistreerd. Wachtwoorden worden gehasht door Clerk en nooit door ons opgeslagen.\n\n8. CONTACT\nOm uw rechten uit te oefenen of voor vragen over privacy: privacy@swim-buddy.com"};

,"terms":"利用規約"},"tr":{"mission":"Misyon","features":"Özellikler","plans":"Planlar","contact":"İletişim","back":"Ana sayfaya dön","privacy":"Gizlilik Politikası","terms":"Kullanım Koşulları"},"ko":{"mission":"미션","features":"기능","plans":"플랜","contact":"문의","back":"홈으로 돌아가기","privacy":"개인정보 보호정책","terms":"이용 약관"},"vi":{"mission":"Sứ mệnh","features":"Tính năng","plans":"Gói","contact":"Liên hệ","back":"Về trang chủ","privacy":"Chính sách Bảo mật","terms":"Điều khoản Sử dụng"},"pl":{"mission":"Misja","features":"Funkcje","plans":"Plany","contact":"Kontakt","back":"Powrót do strony głównej","privacy":"Polityka Prywatności","terms":"Warunki Użytkowania"},"nl":{"mission":"Missie","features":"Functies","plans":"Plannen","contact":"Contact","back":"Terug naar home","privacy":"Privacybeleid","terms":"Gebruiksvoorwaarden"}};

  const nav = NAV[lang] || NAV.en;
  document.documentElement.lang = lang;
  document.getElementById("legalBody").textContent = DOCS[lang] || DOCS.en;
  document.querySelectorAll('[data-nav="mission"]').forEach(el => el.textContent = nav.mission);
  document.querySelectorAll('[data-nav="features"]').forEach(el => el.textContent = nav.features);
  document.querySelectorAll('[data-nav="plans"]').forEach(el => el.textContent = nav.plans);
  document.querySelectorAll('[data-nav="contact"]').forEach(el => el.textContent = nav.contact);
  document.querySelectorAll('[data-nav="back"]').forEach(el => el.textContent = nav.back);
  document.querySelectorAll('[data-nav="privacy"]').forEach(el => el.textContent = nav.privacy);
  document.querySelectorAll('[data-nav="terms"]').forEach(el => el.textContent = nav.terms);
  document.querySelector('[data-nav="switchLabel"]').textContent = "";
  document.querySelector('[data-nav="switchLink"]').textContent = nav[OTHER_LABEL_KEY];
  document.getElementById("langLabel").textContent = LANG_LABELS[lang] || lang.toUpperCase();
  document.querySelectorAll(".lang-option").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
  localStorage.setItem("bs-lang", lang);
}

const langBtn = document.getElementById("langBtn");
const langDropdown = document.getElementById("langDropdown");
langBtn.addEventListener("click", e => { e.stopPropagation(); langDropdown.classList.toggle("open"); });
document.addEventListener("click", () => langDropdown.classList.remove("open"));
document.querySelectorAll(".lang-option").forEach(btn => {
  btn.addEventListener("click", () => { applyLang(btn.dataset.lang); langDropdown.classList.remove("open"); });
});

applyLang(detectLang());
</script>
</body>
</html>
