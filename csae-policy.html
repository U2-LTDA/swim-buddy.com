<script>
const DOCS = {"en": "CHILD SAFETY STANDARDS — SWIM BUDDY\n\nLast updated: 6 July 2026\n\n1. ZERO TOLERANCE\nSwim Buddy has zero tolerance for child sexual abuse and exploitation (CSAE) of any kind. This policy applies to all users of the Swim Buddy app and website, in every country where the service is available.\n\n2. AGE REQUIREMENT\nSwim Buddy is intended for adults only (18 years of age or older). Accounts found to belong to a minor are suspended or terminated on discovery.\n\n3. PROHIBITED CONTENT AND CONDUCT\nUsers are strictly prohibited from using Swim Buddy to:\n- Upload, share, request, or link to child sexual abuse material (CSAM) in any form\n- Sexualize, groom, solicit, or otherwise endanger a minor\n- Contact or attempt to contact a minor for a sexual or exploitative purpose\n- Use profile, bio, group, or messaging features to advertise, promote, or facilitate any of the above\n\n4. REPORTING\nAny user can report a profile, swim group, or message directly from the app, or by emailing contact@swim-buddy.com. Reports are reviewed by our team and, where CSAE is suspected, escalated to the National Center for Missing & Exploited Children (NCMEC) and/or local law enforcement, as required by applicable law.\n\n5. ENFORCEMENT\nAccounts found to violate this policy are permanently banned and reported to the relevant authorities. We cooperate with law enforcement investigations to the fullest extent required by law.\n\n6. CONTACT\nQuestions about this policy can be sent to contact@swim-buddy.com.", "pt": "PADRÕES DE SEGURANÇA INFANTIL — SWIM BUDDY\n\nÚltima atualização: 6 de julho de 2026\n\n1. TOLERÂNCIA ZERO\nA Swim Buddy tem tolerância zero contra qualquer forma de abuso e exploração sexual infantil (CSAE). Esta política se aplica a todos os usuários do aplicativo e do site Swim Buddy, em todos os países onde o serviço está disponível.\n\n2. REQUISITO DE IDADE\nA Swim Buddy é destinada exclusivamente a adultos (18 anos ou mais). Contas identificadas como pertencentes a um menor de idade são suspensas ou encerradas assim que descobertas.\n\n3. CONTEÚDO E CONDUTA PROIBIDOS\nÉ estritamente proibido usar a Swim Buddy para:\n- Enviar, compartilhar, solicitar ou linkar material de abuso sexual infantil (CSAM) em qualquer formato\n- Sexualizar, aliciar (\"grooming\"), assediar ou de qualquer forma colocar um menor em risco\n- Contatar ou tentar contatar um menor com finalidade sexual ou de exploração\n- Usar perfil, bio, grupos ou mensagens para anunciar, promover ou facilitar qualquer uma das condutas acima\n\n4. DENÚNCIAS\nQualquer usuário pode denunciar um perfil, grupo de nado ou mensagem diretamente pelo aplicativo, ou enviando um e-mail para contact@swim-buddy.com. As denúncias são analisadas pela nossa equipe e, quando há suspeita de CSAE, encaminhadas ao National Center for Missing & Exploited Children (NCMEC) e/ou às autoridades locais, conforme exigido pela legislação aplicável.\n\n5. MEDIDAS APLICADAS\nContas que violarem esta política são banidas permanentemente e reportadas às autoridades competentes. Cooperamos com investigações policiais na extensão máxima exigida por lei.\n\n6. CONTATO\nDúvidas sobre esta política podem ser enviadas para contact@swim-buddy.com.", "es": "ESTÁNDARES DE SEGURIDAD INFANTIL — SWIM BUDDY\n\nÚltima actualización: 6 de julio de 2026\n\n1. TOLERANCIA CERO\nSwim Buddy tiene tolerancia cero ante cualquier forma de abuso y explotación sexual infantil (CSAE). Esta política se aplica a todos los usuarios de la aplicación y el sitio web de Swim Buddy, en todos los países donde el servicio está disponible.\n\n2. REQUISITO DE EDAD\nSwim Buddy está destinada exclusivamente a adultos (18 años o más). Las cuentas identificadas como pertenecientes a un menor son suspendidas o eliminadas en cuanto se detectan.\n\n3. CONTENIDO Y CONDUCTA PROHIBIDOS\nEstá estrictamente prohibido usar Swim Buddy para:\n- Subir, compartir, solicitar o enlazar material de abuso sexual infantil (CSAM) en cualquier formato\n- Sexualizar, captar (\"grooming\"), acosar o poner en riesgo de cualquier forma a un menor\n- Contactar o intentar contactar a un menor con fines sexuales o de explotación\n- Usar el perfil, la biografía, los grupos o los mensajes para anunciar, promover o facilitar cualquiera de las conductas anteriores\n\n4. DENUNCIAS\nCualquier usuario puede denunciar un perfil, grupo de natación o mensaje directamente desde la aplicación, o escribiendo a contact@swim-buddy.com. Las denuncias son revisadas por nuestro equipo y, cuando se sospecha CSAE, se remiten al National Center for Missing & Exploited Children (NCMEC) y/o a las autoridades locales, según lo exija la ley aplicable.\n\n5. MEDIDAS APLICADAS\nLas cuentas que infrinjan esta política son baneadas permanentemente y reportadas a las autoridades competentes. Cooperamos con las investigaciones policiales en la máxima medida exigida por la ley.\n\n6. CONTACTO\nLas preguntas sobre esta política pueden enviarse a contact@swim-buddy.com.", "de": "KINDERSCHUTZSTANDARDS — SWIM BUDDY\n\nZuletzt aktualisiert: 6. Juli 2026\n\n1. NULLTOLERANZ\nSwim Buddy verfolgt eine Nulltoleranzpolitik gegenüber jeglicher Form von sexuellem Kindesmissbrauch und Ausbeutung (CSAE). Diese Richtlinie gilt für alle Nutzer der Swim-Buddy-App und -Website, in jedem Land, in dem der Dienst verfügbar ist.\n\n2. ALTERSANFORDERUNG\nSwim Buddy richtet sich ausschließlich an Erwachsene (18 Jahre oder älter). Konten, die nachweislich Minderjährigen gehören, werden bei Entdeckung gesperrt oder gelöscht.\n\n3. VERBOTENE INHALTE UND VERHALTENSWEISEN\nEs ist strengstens untersagt, Swim Buddy zu nutzen, um:\n- Material über sexuellen Missbrauch von Kindern (CSAM) in jeglicher Form hochzuladen, zu teilen, anzufragen oder zu verlinken\n- Minderjährige zu sexualisieren, anzubahnen (\"Grooming\"), zu belästigen oder anderweitig zu gefährden\n- Minderjährige zu sexuellen oder ausbeuterischen Zwecken zu kontaktieren oder zu versuchen zu kontaktieren\n- Profil-, Bio-, Gruppen- oder Nachrichtenfunktionen zu nutzen, um eines der oben genannten Verhaltensweisen zu bewerben oder zu erleichtern\n\n4. MELDUNGEN\nJeder Nutzer kann ein Profil, eine Schwimmgruppe oder eine Nachricht direkt über die App melden oder eine E-Mail an contact@swim-buddy.com senden. Meldungen werden von unserem Team geprüft und bei Verdacht auf CSAE an das National Center for Missing & Exploited Children (NCMEC) und/oder die örtlichen Strafverfolgungsbehörden weitergeleitet, soweit gesetzlich vorgeschrieben.\n\n5. DURCHSETZUNG\nKonten, die gegen diese Richtlinie verstoßen, werden dauerhaft gesperrt und den zuständigen Behörden gemeldet. Wir kooperieren im gesetzlich vorgeschriebenen Umfang mit Strafverfolgungsbehörden.\n\n6. KONTAKT\nFragen zu dieser Richtlinie können an contact@swim-buddy.com gesendet werden.", "fr": "NORMES DE SÉCURITÉ DES ENFANTS — SWIM BUDDY\n\nDernière mise à jour : 6 juillet 2026\n\n1. TOLÉRANCE ZÉRO\nSwim Buddy applique une tolérance zéro envers toute forme d'abus et d'exploitation sexuelle des enfants (CSAE). Cette politique s'applique à tous les utilisateurs de l'application et du site Swim Buddy, dans tous les pays où le service est disponible.\n\n2. EXIGENCE D'ÂGE\nSwim Buddy est réservée aux adultes (18 ans ou plus). Les comptes identifiés comme appartenant à un mineur sont suspendus ou résiliés dès leur découverte.\n\n3. CONTENUS ET COMPORTEMENTS INTERDITS\nIl est strictement interdit d'utiliser Swim Buddy pour :\n- Téléverser, partager, demander ou créer un lien vers du matériel d'abus sexuel sur enfants (CSAM), sous quelque forme que ce soit\n- Sexualiser, manipuler (\"grooming\"), solliciter ou mettre en danger un mineur de toute autre manière\n- Contacter ou tenter de contacter un mineur à des fins sexuelles ou d'exploitation\n- Utiliser le profil, la bio, les groupes ou la messagerie pour promouvoir ou faciliter l'un des comportements ci-dessus\n\n4. SIGNALEMENT\nTout utilisateur peut signaler un profil, un groupe de nage ou un message directement depuis l'application, ou en écrivant à contact@swim-buddy.com. Les signalements sont examinés par notre équipe et, en cas de suspicion de CSAE, transmis au National Center for Missing & Exploited Children (NCMEC) et/ou aux forces de l'ordre locales, conformément à la loi applicable.\n\n5. APPLICATION\nLes comptes enfreignant cette politique sont bannis définitivement et signalés aux autorités compétentes. Nous coopérons avec les enquêtes des forces de l'ordre dans toute la mesure exigée par la loi.\n\n6. CONTACT\nLes questions concernant cette politique peuvent être envoyées à contact@swim-buddy.com.", "it": "STANDARD DI SICUREZZA PER I MINORI — SWIM BUDDY\n\nUltimo aggiornamento: 6 luglio 2026\n\n1. TOLLERANZA ZERO\nSwim Buddy ha tolleranza zero verso qualsiasi forma di abuso e sfruttamento sessuale dei minori (CSAE). Questa politica si applica a tutti gli utenti dell'app e del sito Swim Buddy, in ogni paese in cui il servizio è disponibile.\n\n2. REQUISITO DI ETÀ\nSwim Buddy è destinata esclusivamente agli adulti (18 anni o più). Gli account risultati appartenere a un minore vengono sospesi o chiusi non appena scoperti.\n\n3. CONTENUTI E COMPORTAMENTI VIETATI\nÈ severamente vietato utilizzare Swim Buddy per:\n- Caricare, condividere, richiedere o collegare materiale di abuso sessuale su minori (CSAM) in qualsiasi forma\n- Sessualizzare, adescare (\"grooming\"), molestare o comunque mettere in pericolo un minore\n- Contattare o tentare di contattare un minore per scopi sessuali o di sfruttamento\n- Usare profilo, bio, gruppi o messaggi per pubblicizzare, promuovere o facilitare uno qualsiasi dei comportamenti sopra indicati\n\n4. SEGNALAZIONE\nQualsiasi utente può segnalare un profilo, un gruppo di nuoto o un messaggio direttamente dall'app, oppure scrivendo a contact@swim-buddy.com. Le segnalazioni vengono esaminate dal nostro team e, in caso di sospetto CSAE, inoltrate al National Center for Missing & Exploited Children (NCMEC) e/o alle autorità locali, come richiesto dalla legge applicabile.\n\n5. MISURE APPLICATE\nGli account che violano questa politica vengono banditi permanentemente e segnalati alle autorità competenti. Collaboriamo con le indagini delle forze dell'ordine nella massima misura richiesta dalla legge.\n\n6. CONTATTO\nDomande su questa politica possono essere inviate a contact@swim-buddy.com.", "hu": "GYERMEKVÉDELMI SZABVÁNYOK — SWIM BUDDY\n\nUtolsó frissítés: 2026. július 6.\n\n1. NULLA TOLERANCIA\nA Swim Buddy nulla toleranciát alkalmaz a gyermekek szexuális bántalmazásának és kizsákmányolásának (CSAE) bármely formájával szemben. Ez a szabályzat a Swim Buddy alkalmazás és weboldal minden felhasználójára vonatkozik, minden olyan országban, ahol a szolgáltatás elérhető.\n\n2. ÉLETKORI KÖVETELMÉNY\nA Swim Buddy kizárólag felnőtteknek (18 éves vagy idősebb) szól. A kiskorúhoz tartozónak bizonyuló fiókokat felfedezéskor felfüggesztjük vagy megszüntetjük.\n\n3. TILTOTT TARTALOM ÉS MAGATARTÁS\nSzigorúan tilos a Swim Buddy használata az alábbi célokra:\n- Gyermekek szexuális bántalmazásáról készült anyag (CSAM) feltöltése, megosztása, kérése vagy arra mutató hivatkozás bármilyen formában\n- Kiskorú szexualizálása, \"grooming\", zaklatása vagy bármilyen más módon veszélyeztetése\n- Kiskorúval szexuális vagy kizsákmányoló céllal való kapcsolatfelvétel vagy annak megkísérlése\n- Profil, bemutatkozás, csoportok vagy üzenetek használata a fentiek bármelyikének hirdetésére, népszerűsítésére vagy elősegítésére\n\n4. BEJELENTÉS\nBármely felhasználó jelenthet profilt, úszócsoportot vagy üzenetet közvetlenül az alkalmazásból, vagy a contact@swim-buddy.com címre írva. A bejelentéseket csapatunk vizsgálja, és CSAE gyanúja esetén továbbítjuk a National Center for Missing & Exploited Children (NCMEC) szervezetnek és/vagy a helyi hatóságoknak, az alkalmazandó jog szerint.\n\n5. INTÉZKEDÉSEK\nA szabályzatot megsértő fiókokat véglegesen kitiltjuk, és jelentjük az illetékes hatóságoknak. A törvény által megkövetelt mértékben együttműködünk a bűnüldöző szervek nyomozásaival.\n\n6. KAPCSOLAT\nA szabályzattal kapcsolatos kérdéseket a contact@swim-buddy.com címre lehet küldeni.", "zh": "儿童安全标准 — SWIM BUDDY\n\n最后更新：2026年7月6日\n\n1. 零容忍\nSwim Buddy 对任何形式的儿童性虐待和剥削（CSAE）采取零容忍态度。本政策适用于 Swim Buddy 应用和网站的所有用户，适用于提供服务的所有国家。\n\n2. 年龄要求\nSwim Buddy 仅面向成年人（18岁及以上）。一旦发现账户属于未成年人，将被暂停或终止。\n\n3. 禁止的内容和行为\n严禁使用 Swim Buddy 进行以下行为：\n- 以任何形式上传、分享、请求或链接儿童性虐待材料（CSAM）\n- 对未成年人进行性化、诱骗（“grooming”）、骚扰或以其他方式危害未成年人\n- 出于性或剥削目的联系或试图联系未成年人\n- 利用个人资料、简介、群组或消息功能宣传、推广或协助上述任何行为\n\n4. 举报\n任何用户都可以直接在应用内举报个人资料、游泳群组或消息，或发送电子邮件至 contact@swim-buddy.com。我们的团队会审核举报内容，如怀疑存在 CSAE，将根据适用法律上报至美国国家失踪与受剥削儿童中心（NCMEC）和/或当地执法机构。\n\n5. 执行措施\n违反本政策的账户将被永久封禁，并上报相关部门。我们将在法律要求的最大范围内配合执法调查。\n\n6. 联系方式\n有关本政策的问题可发送至 contact@swim-buddy.com。", "hi": "बाल सुरक्षा मानक — SWIM BUDDY\n\nअंतिम अद्यतन: 6 जुलाई 2026\n\n1. शून्य सहनशीलता\nSwim Buddy बाल यौन शोषण और उत्पीड़न (CSAE) के किसी भी रूप के प्रति शून्य सहनशीलता रखता है। यह नीति उन सभी देशों में Swim Buddy ऐप और वेबसाइट के सभी उपयोगकर्ताओं पर लागू होती है जहाँ यह सेवा उपलब्ध है।\n\n2. आयु आवश्यकता\nSwim Buddy केवल वयस्कों (18 वर्ष या उससे अधिक) के लिए है। नाबालिग से संबंधित पाए जाने वाले खातों को पता चलते ही निलंबित या समाप्त कर दिया जाता है।\n\n3. निषिद्ध सामग्री और आचरण\nSwim Buddy का उपयोग निम्नलिखित के लिए करना सख्त वर्जित है:\n- किसी भी रूप में बाल यौन शोषण सामग्री (CSAM) अपलोड करना, साझा करना, अनुरोध करना या उसका लिंक देना\n- किसी नाबालिग का यौनकरण, \"ग्रूमिंग\", उत्पीड़न या किसी अन्य तरीके से खतरे में डालना\n- यौन या शोषण के उद्देश्य से किसी नाबालिग से संपर्क करना या संपर्क करने का प्रयास करना\n- प्रोफ़ाइल, बायो, समूह या संदेश सुविधाओं का उपयोग उपरोक्त में से किसी का विज्ञापन, प्रचार या सुविधा प्रदान करने के लिए करना\n\n4. रिपोर्टिंग\nकोई भी उपयोगकर्ता ऐप से सीधे किसी प्रोफ़ाइल, तैराकी समूह या संदेश की रिपोर्ट कर सकता है, या contact@swim-buddy.com पर ईमेल कर सकता है। रिपोर्ट की समीक्षा हमारी टीम द्वारा की जाती है और CSAE का संदेह होने पर, लागू कानून के अनुसार नेशनल सेंटर फॉर मिसिंग एंड एक्सप्लॉइटेड चिल्ड्रन (NCMEC) और/या स्थानीय कानून प्रवर्तन को भेजी जाती है।\n\n5. प्रवर्तन\nइस नीति का उल्लंघन करने वाले खातों को स्थायी रूप से प्रतिबंधित किया जाता है और संबंधित अधिकारियों को सूचित किया जाता है। हम कानून द्वारा आवश्यक पूरी सीमा तक कानून प्रवर्तन जांच में सहयोग करते हैं।\n\n6. संपर्क\nइस नीति के बारे में प्रश्न contact@swim-buddy.com पर भेजे जा सकते हैं।", "bn": "শিশু নিরাপত্তা মানদণ্ড — SWIM BUDDY\n\nসর্বশেষ আপডেট: ৬ জুলাই ২০২৬\n\n১. শূন্য সহনশীলতা\nSwim Buddy যেকোনো ধরনের শিশু যৌন নির্যাতন ও শোষণের (CSAE) প্রতি শূন্য সহনশীলতা বজায় রাখে। এই নীতি সেবা উপলব্ধ থাকা প্রতিটি দেশে Swim Buddy অ্যাপ ও ওয়েবসাইটের সকল ব্যবহারকারীর ক্ষেত্রে প্রযোজ্য।\n\n২. বয়সের প্রয়োজনীয়তা\nSwim Buddy কেবলমাত্র প্রাপ্তবয়স্কদের (১৮ বছর বা তার বেশি) জন্য। কোনো অ্যাকাউন্ট নাবালকের বলে প্রমাণিত হলে তা শনাক্ত হওয়ামাত্র স্থগিত বা বাতিল করা হয়।\n\n৩. নিষিদ্ধ কনটেন্ট ও আচরণ\nSwim Buddy ব্যবহার করে নিম্নলিখিত কাজ করা কঠোরভাবে নিষিদ্ধ:\n- যেকোনো আকারে শিশু যৌন নির্যাতনমূলক উপাদান (CSAM) আপলোড, শেয়ার, অনুরোধ বা লিঙ্ক করা\n- কোনো নাবালককে যৌনীকরণ, \"গ্রুমিং\", হয়রানি বা অন্য কোনোভাবে বিপদে ফেলা\n- যৌন বা শোষণমূলক উদ্দেশ্যে কোনো নাবালকের সাথে যোগাযোগ করা বা করার চেষ্টা করা\n- প্রোফাইল, বায়ো, গ্রুপ বা মেসেজিং ফিচার ব্যবহার করে উপরোক্ত যেকোনো কাজের বিজ্ঞাপন, প্রচার বা সহায়তা করা\n\n৪. রিপোর্ট করা\nযেকোনো ব্যবহারকারী সরাসরি অ্যাপ থেকে কোনো প্রোফাইল, সাঁতার গ্রুপ বা মেসেজ রিপোর্ট করতে পারেন, অথবা contact@swim-buddy.com এ ইমেইল করতে পারেন। রিপোর্টগুলো আমাদের দল পর্যালোচনা করে এবং CSAE সন্দেহ হলে, প্রযোজ্য আইন অনুযায়ী National Center for Missing & Exploited Children (NCMEC) এবং/অথবা স্থানীয় আইন প্রয়োগকারী সংস্থার কাছে পাঠানো হয়।\n\n৫. প্রয়োগ\nএই নীতি লঙ্ঘনকারী অ্যাকাউন্টগুলো স্থায়ীভাবে নিষিদ্ধ করা হয় এবং সংশ্লিষ্ট কর্তৃপক্ষের কাছে রিপোর্ট করা হয়। আইন দ্বারা নির্ধারিত সর্বোচ্চ পরিমাণে আমরা আইন প্রয়োগকারী তদন্তে সহযোগিতা করি।\n\n৬. যোগাযোগ\nএই নীতি সম্পর্কে প্রশ্ন contact@swim-buddy.com এ পাঠানো যেতে পারে।", "ru": "СТАНДАРТЫ БЕЗОПАСНОСТИ ДЕТЕЙ — SWIM BUDDY\n\nПоследнее обновление: 6 июля 2026 г.\n\n1. НУЛЕВАЯ ТЕРПИМОСТЬ\nSwim Buddy придерживается политики нулевой терпимости к любым формам сексуального насилия и эксплуатации детей (CSAE). Эта политика распространяется на всех пользователей приложения и сайта Swim Buddy во всех странах, где доступен сервис.\n\n2. ВОЗРАСТНОЕ ТРЕБОВАНИЕ\nSwim Buddy предназначен только для взрослых (18 лет и старше). Аккаунты, принадлежащие несовершеннолетним, приостанавливаются или удаляются сразу после обнаружения.\n\n3. ЗАПРЕЩЕННЫЙ КОНТЕНТ И ДЕЙСТВИЯ\nСтрого запрещается использовать Swim Buddy для:\n- Загрузки, распространения, запроса или размещения ссылок на материалы о сексуальном насилии над детьми (CSAM) в любой форме\n- Сексуализации, груминга, домогательств или иного создания угрозы для несовершеннолетних\n- Контакта или попытки контакта с несовершеннолетним в сексуальных или эксплуататорских целях\n- Использования профиля, описания, групп или сообщений для рекламы, продвижения или содействия любому из вышеперечисленного\n\n4. ЖАЛОБЫ\nЛюбой пользователь может пожаловаться на профиль, группу для плавания или сообщение прямо в приложении, либо написав на contact@swim-buddy.com. Жалобы рассматриваются нашей командой, и в случае подозрения на CSAE передаются в Национальный центр по пропавшим и эксплуатируемым детям (NCMEC) и/или местные правоохранительные органы в соответствии с применимым законодательством.\n\n5. МЕРЫ ВОЗДЕЙСТВИЯ\nАккаунты, нарушающие данную политику, блокируются навсегда и о них сообщается соответствующим органам. Мы сотрудничаем с правоохранительными органами в полном объеме, требуемом законом.\n\n6. КОНТАКТЫ\nВопросы по данной политике можно направлять на contact@swim-buddy.com.", "ja": "児童保護基準 — SWIM BUDDY\n\n最終更新日：2026年7月6日\n\n1. ゼロトレランス\nSwim Buddyは、あらゆる形態の児童性的虐待および搾取（CSAE）に対してゼロトレランス（一切許容しない）姿勢を取っています。本ポリシーは、サービスが提供されているすべての国のSwim Buddyアプリおよびウェブサイトの全ユーザーに適用されます。\n\n2. 年齢要件\nSwim Buddyは成人（18歳以上）のみを対象としています。未成年者に属することが判明したアカウントは、発見次第、停止または削除されます。\n\n3. 禁止されるコンテンツおよび行為\nSwim Buddyを以下の目的で使用することは固く禁じられています：\n- あらゆる形態の児童性的虐待material（CSAM）のアップロード、共有、要求、またはリンク\n- 未成年者の性的対象化、グルーミング、勧誘、その他の方法での危険にさらす行為\n- 性的または搾取的な目的で未成年者に接触する、または接触を試みること\n- プロフィール、自己紹介、グループ、メッセージ機能を利用して上記いずれかの行為を宣伝、促進、または助長すること\n\n4. 通報\nユーザーは、アプリから直接プロフィール、スイムグループ、またはメッセージを通報できます。また、contact@swim-buddy.comへのメールでも通報可能です。通報は当社チームによって審査され、CSAEの疑いがある場合、適用法に従い、行方不明・搾取児童センター（NCMEC）および／または現地の法執行機関に報告されます。\n\n5. 措置\n本ポリシーに違反したアカウントは永久に禁止され、関係当局に報告されます。当社は法律で求められる最大限の範囲で法執行機関の捜査に協力します。\n\n6. お問い合わせ\n本ポリシーに関するご質問は、contact@swim-buddy.comまでお送りください。", "tr": "ÇOCUK GÜVENLİĞİ STANDARTLARI — SWIM BUDDY\n\nSon güncelleme: 6 Temmuz 2026\n\n1. SIFIR TOLERANS\nSwim Buddy, her türlü çocuk cinsel istismarı ve sömürüsüne (CSAE) karşı sıfır tolerans politikası uygular. Bu politika, hizmetin sunulduğu her ülkede Swim Buddy uygulaması ve web sitesinin tüm kullanıcıları için geçerlidir.\n\n2. YAŞ ŞARTI\nSwim Buddy yalnızca yetişkinler (18 yaş ve üzeri) için tasarlanmıştır. Bir reşit olmayana ait olduğu tespit edilen hesaplar, keşfedildiğinde askıya alınır veya kapatılır.\n\n3. YASAK İÇERİK VE DAVRANIŞLAR\nSwim Buddy'nin aşağıdaki amaçlarla kullanılması kesinlikle yasaktır:\n- Herhangi bir biçimde çocuk cinsel istismarı materyali (CSAM) yüklemek, paylaşmak, talep etmek veya bağlantı vermek\n- Bir reşit olmayanı cinselleştirmek, kandırmak (\"grooming\"), taciz etmek veya başka bir şekilde tehlikeye atmak\n- Cinsel veya sömürücü amaçlarla bir reşit olmayanla iletişime geçmek veya geçmeye çalışmak\n- Profil, biyografi, grup veya mesajlaşma özelliklerini yukarıdakilerden herhangi birini tanıtmak, teşvik etmek veya kolaylaştırmak için kullanmak\n\n4. BİLDİRİM\nHerhangi bir kullanıcı, uygulama üzerinden doğrudan bir profili, yüzme grubunu veya mesajı bildirebilir ya da contact@swim-buddy.com adresine e-posta gönderebilir. Bildirimler ekibimiz tarafından incelenir ve CSAE şüphesi durumunda, geçerli yasalar uyarınca National Center for Missing & Exploited Children (NCMEC) ve/veya yerel kolluk kuvvetlerine iletilir.\n\n5. UYGULAMA\nBu politikayı ihlal ettiği tespit edilen hesaplar kalıcı olarak yasaklanır ve ilgili makamlara bildirilir. Yasanın gerektirdiği azami ölçüde kolluk kuvvetleri soruşturmalarıyla iş birliği yaparız.\n\n6. İLETİŞİM\nBu politikayla ilgili sorular contact@swim-buddy.com adresine gönderilebilir.", "ko": "아동 안전 기준 — SWIM BUDDY\n\n최종 업데이트: 2026년 7월 6일\n\n1. 무관용 원칙\nSwim Buddy는 어떠한 형태의 아동 성적 학대 및 착취(CSAE)에 대해서도 무관용 원칙을 적용합니다. 이 정책은 서비스가 제공되는 모든 국가의 Swim Buddy 앱 및 웹사이트의 모든 사용자에게 적용됩니다.\n\n2. 연령 요건\nSwim Buddy는 성인(만 18세 이상)만을 대상으로 합니다. 미성년자 소유로 확인된 계정은 발견 즉시 정지되거나 삭제됩니다.\n\n3. 금지된 콘텐츠 및 행위\n다음과 같은 목적으로 Swim Buddy를 사용하는 것은 엄격히 금지됩니다:\n- 어떤 형태로든 아동 성 착취물(CSAM)을 업로드, 공유, 요청 또는 링크하는 행위\n- 미성년자를 성적 대상화하거나, \"그루밍\"하거나, 유인하거나, 기타 방식으로 위험에 빠뜨리는 행위\n- 성적 또는 착취적 목적으로 미성년자에게 연락하거나 연락을 시도하는 행위\n- 프로필, 자기소개, 그룹 또는 메시지 기능을 사용하여 위의 어떤 행위든 광고, 홍보 또는 조장하는 행위\n\n4. 신고\n모든 사용자는 앱에서 직접 프로필, 수영 그룹 또는 메시지를 신고하거나 contact@swim-buddy.com으로 이메일을 보낼 수 있습니다. 신고 내용은 당사 팀이 검토하며, CSAE가 의심되는 경우 관련 법률에 따라 실종 및 착취 아동 센터(NCMEC) 및/또는 현지 법 집행 기관에 신고됩니다.\n\n5. 시행 조치\n본 정책을 위반한 계정은 영구적으로 차단되며 관계 당국에 신고됩니다. 당사는 법률이 요구하는 최대 범위 내에서 법 집행 수사에 협조합니다.\n\n6. 문의\n본 정책에 관한 문의 사항은 contact@swim-buddy.com으로 보내주시기 바랍니다.", "vi": "TIÊU CHUẨN AN TOÀN TRẺ EM — SWIM BUDDY\n\nCập nhật lần cuối: 6 tháng 7 năm 2026\n\n1. KHÔNG KHOAN NHƯỢNG\nSwim Buddy áp dụng chính sách không khoan nhượng đối với mọi hình thức lạm dụng và bóc lột tình dục trẻ em (CSAE). Chính sách này áp dụng cho tất cả người dùng ứng dụng và trang web Swim Buddy, tại mọi quốc gia nơi dịch vụ được cung cấp.\n\n2. YÊU CẦU VỀ ĐỘ TUỔI\nSwim Buddy chỉ dành cho người trưởng thành (từ 18 tuổi trở lên). Các tài khoản bị phát hiện thuộc về người chưa thành niên sẽ bị đình chỉ hoặc chấm dứt ngay khi phát hiện.\n\n3. NỘI DUNG VÀ HÀNH VI BỊ CẤM\nNghiêm cấm sử dụng Swim Buddy để:\n- Tải lên, chia sẻ, yêu cầu hoặc liên kết đến tài liệu lạm dụng tình dục trẻ em (CSAM) dưới bất kỳ hình thức nào\n- Tình dục hóa, dụ dỗ (\"grooming\"), quấy rối hoặc gây nguy hiểm cho trẻ vị thành niên theo bất kỳ cách nào khác\n- Liên hệ hoặc cố gắng liên hệ với trẻ vị thành niên vì mục đích tình dục hoặc bóc lột\n- Sử dụng hồ sơ, tiểu sử, nhóm hoặc tin nhắn để quảng cáo, thúc đẩy hoặc tạo điều kiện cho bất kỳ hành vi nào nêu trên\n\n4. BÁO CÁO\nBất kỳ người dùng nào cũng có thể báo cáo hồ sơ, nhóm bơi lội hoặc tin nhắn trực tiếp từ ứng dụng, hoặc gửi email đến contact@swim-buddy.com. Các báo cáo sẽ được đội ngũ của chúng tôi xem xét và, nếu nghi ngờ có CSAE, sẽ được chuyển đến Trung tâm Quốc gia về Trẻ em Mất tích và Bị bóc lột (NCMEC) và/hoặc cơ quan thực thi pháp luật địa phương theo yêu cầu của pháp luật hiện hành.\n\n5. THỰC THI\nCác tài khoản vi phạm chính sách này sẽ bị cấm vĩnh viễn và bị báo cáo cho các cơ quan chức năng liên quan. Chúng tôi hợp tác với các cuộc điều tra của cơ quan thực thi pháp luật ở mức tối đa theo yêu cầu của pháp luật.\n\n6. LIÊN HỆ\nCác câu hỏi về chính sách này có thể được gửi đến contact@swim-buddy.com.", "pl": "STANDARDY BEZPIECZEŃSTWA DZIECI — SWIM BUDDY\n\nOstatnia aktualizacja: 6 lipca 2026 r.\n\n1. ZERO TOLERANCJI\nSwim Buddy stosuje politykę zerowej tolerancji wobec jakiejkolwiek formy wykorzystywania i niegodziwego traktowania dzieci w celach seksualnych (CSAE). Niniejsza polityka dotyczy wszystkich użytkowników aplikacji i strony internetowej Swim Buddy, we wszystkich krajach, w których usługa jest dostępna.\n\n2. WYMÓG WIEKOWY\nSwim Buddy jest przeznaczona wyłącznie dla osób dorosłych (18 lat lub więcej). Konta, co do których stwierdzono, że należą do osoby niepełnoletniej, są zawieszane lub usuwane natychmiast po wykryciu.\n\n3. ZABRONIONE TREŚCI I ZACHOWANIA\nSurowo zabrania się wykorzystywania Swim Buddy do:\n- Przesyłania, udostępniania, żądania lub linkowania materiałów przedstawiających wykorzystywanie seksualne dzieci (CSAM) w jakiejkolwiek formie\n- Seksualizowania, uwodzenia (\"grooming\"), nękania lub narażania w inny sposób osoby niepełnoletniej\n- Kontaktowania się lub próby kontaktu z osobą niepełnoletnią w celach seksualnych lub eksploatacyjnych\n- Wykorzystywania profilu, opisu, grup lub wiadomości do reklamowania, promowania lub ułatwiania jakiegokolwiek z powyższych zachowań\n\n4. ZGŁASZANIE\nKażdy użytkownik może zgłosić profil, grupę pływacką lub wiadomość bezpośrednio w aplikacji lub wysyłając e-mail na adres contact@swim-buddy.com. Zgłoszenia są weryfikowane przez nasz zespół, a w przypadku podejrzenia CSAE przekazywane do National Center for Missing & Exploited Children (NCMEC) i/lub lokalnych organów ścigania, zgodnie z obowiązującym prawem.\n\n5. EGZEKWOWANIE\nKonta naruszające niniejszą politykę są trwale banowane i zgłaszane odpowiednim organom. Współpracujemy z organami ścigania w zakresie wymaganym przez prawo.\n\n6. KONTAKT\nPytania dotyczące niniejszej polityki można kierować na adres contact@swim-buddy.com.", "nl": "NORMEN VOOR KINDERVEILIGHEID — SWIM BUDDY\n\nLaatst bijgewerkt: 6 juli 2026\n\n1. NULTOLERANTIE\nSwim Buddy hanteert nultolerantie voor elke vorm van seksueel misbruik en uitbuiting van kinderen (CSAE). Dit beleid geldt voor alle gebruikers van de Swim Buddy-app en -website, in elk land waar de dienst beschikbaar is.\n\n2. LEEFTIJDSVEREISTE\nSwim Buddy is uitsluitend bedoeld voor volwassenen (18 jaar of ouder). Accounts waarvan wordt vastgesteld dat ze aan een minderjarige toebehoren, worden bij ontdekking opgeschort of beëindigd.\n\n3. VERBODEN INHOUD EN GEDRAG\nHet is ten strengste verboden om Swim Buddy te gebruiken om:\n- Materiaal van seksueel kindermisbruik (CSAM) in welke vorm dan ook te uploaden, delen, opvragen of te linken\n- Een minderjarige te seksualiseren, te \"groomen\", lastig te vallen of anderszins in gevaar te brengen\n- Contact op te nemen of te proberen contact op te nemen met een minderjarige voor seksuele of uitbuitende doeleinden\n- Profiel-, bio-, groeps- of berichtenfuncties te gebruiken om een van de bovenstaande zaken te adverteren, promoten of faciliteren\n\n4. MELDEN\nElke gebruiker kan een profiel, zwemgroep of bericht rechtstreeks vanuit de app melden, of een e-mail sturen naar contact@swim-buddy.com. Meldingen worden beoordeeld door ons team en, indien CSAE wordt vermoed, doorgestuurd naar het National Center for Missing & Exploited Children (NCMEC) en/of de lokale rechtshandhaving, zoals vereist door de toepasselijke wetgeving.\n\n5. HANDHAVING\nAccounts die dit beleid schenden, worden permanent verbannen en gemeld bij de relevante autoriteiten. Wij werken mee aan opsporingsonderzoeken voor zover wettelijk vereist.\n\n6. CONTACT\nVragen over dit beleid kunnen worden gestuurd naar contact@swim-buddy.com."};

const LANG_LABELS = {"en":"EN","pt":"PT","es":"ES","de":"DE","fr":"FR","it":"IT","hu":"HU","zh":"中文","hi":"हिं","bn":"বাং","ru":"RU","ja":"日本語","tr":"TR","ko":"한국어","vi":"VI","pl":"PL","nl":"NL"};

function detectLang() {
  const saved = localStorage.getItem("bs-lang");
  if (saved && DOCS[saved]) return saved;
  return "pt";
}

function applyLang(lang) {
  const nav = NAV[lang] || NAV.en;
  document.documentElement.lang = lang;
  document.getElementById("legalBody").textContent = DOCS[lang] || DOCS.en;
  document.querySelectorAll('[data-nav="mission"]').forEach(el => el.textContent = nav.mission);
  document.querySelectorAll('[data-nav="features"]').forEach(el => el.textContent = nav.features);
  document.querySelectorAll('[data-nav="plans"]').forEach(el => el.textContent = nav.plans);
  document.querySelectorAll('[data-nav="contact"]').forEach(el => el.textContent = nav.contact);
  document.querySelectorAll('[data-nav="back"]').forEach(el => el.textContent = nav.back);
  document.querySelectorAll('[data-nav="privacy"]').forEach(el => el.textContent = nav.privacy);
  document.querySelectorAll('[data-nav="terms"]').forEach(el => el.textContent = nav.terms);
  document.querySelectorAll('[data-nav="csae"]').forEach(el => el.textContent = nav.csae);
  document.getElementById("langLabel").textContent = LANG_LABELS[lang] || lang.toUpperCase();
  document.querySelectorAll(".lang-option").forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
  localStorage.setItem("bs-lang", lang);
}

const langBtn = document.getElementById("langBtn");
const langDropdown = document.getElementById("langDropdown");
langBtn.addEventListener("click", e => { e.stopPropagation(); langDropdown.classList.toggle("open"); });
document.addEventListener("click", () => langDropdown.classList.remove("open"));
document.querySelectorAll(".lang-option").forEach(btn => {
  btn.addEventListener("click", () => { applyLang(btn.dataset.lang); langDropdown.classList.remove("open"); });
});

applyLang(detectLang());
</script>
