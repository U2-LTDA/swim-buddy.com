  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A1A2E; --bg2: #0E2240; --card: #112348;
      --primary: #00B4D8; --primary-dark: #0096B7;
      --fg: #E8F3FA; --muted: #7BA7BC; --border: #1E3A5F; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* NAV */
    nav { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .nav-logo { font-size: 18px; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { color: var(--muted); font-size: 14px; font-weight: 500; }
    .nav-links a:hover { color: var(--fg); text-decoration: none; }
    .nav-cta { background: var(--primary); color: #fff !important; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; }
    .nav-cta:hover { background: var(--primary-dark) !important; text-decoration: none !important; }

    /* LANG SWITCHER */
    .lang-switcher { position: relative; }
    .lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--fg); padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .lang-btn:hover { border-color: var(--primary); }
    .lang-dropdown { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-width: 140px; z-index: 200; }
    .lang-dropdown.open { display: block; }
    .lang-option { display: block; width: 100%; padding: 10px 14px; font-size: 13px; color: var(--fg); background: none; border: none; text-align: left; cursor: pointer; }
    .lang-option:hover { background: var(--bg2); }
    .lang-option.active { color: var(--primary); font-weight: 600; }

    /* HERO */
    .hero { text-align: center; padding: 100px 24px 80px; max-width: 720px; margin: 0 auto; }
    .hero-badge { display: inline-block; background: #00B4D822; color: var(--primary); border: 1px solid #00B4D844; border-radius: 99px; padding: 4px 14px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
    .hero h1 { font-size: clamp(32px, 6vw, 56px); font-weight: 800; line-height: 1.15; letter-spacing: -1px; margin-bottom: 20px; }
    .hero h1 span { color: var(--primary); }
    .hero p { font-size: 18px; color: var(--muted); max-width: 520px; margin: 0 auto 36px; }
    .hero-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: var(--primary); color: #fff; padding: 14px 28px; border-radius: var(--radius); font-weight: 700; font-size: 15px; display: inline-block; }
    .btn-primary:hover { background: var(--primary-dark); text-decoration: none; }
    .btn-secondary { background: transparent; color: var(--fg); border: 1px solid var(--border); padding: 14px 28px; border-radius: var(--radius); font-weight: 600; font-size: 15px; display: inline-block; }
    .btn-secondary:hover { border-color: var(--primary); color: var(--primary); text-decoration: none; }
    .store-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .store-badge { display: inline-flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; color: var(--fg); font-size: 13px; transition: border-color 0.2s; }
    .store-badge:hover { border-color: var(--primary); text-decoration: none; color: var(--fg); }
    .store-badge .store-icon { font-size: 22px; }
    .store-badge .store-text { text-align: left; }
    .store-badge .store-label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .store-badge .store-name { display: block; font-size: 15px; font-weight: 700; }

    /* SECTIONS */
    section { padding: 80px 24px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .section-label { text-transform: uppercase; letter-spacing: 1.5px; font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
    .section-title { font-size: clamp(24px, 4vw, 36px); font-weight: 800; letter-spacing: -0.5px; margin-bottom: 16px; }
    .section-sub { font-size: 17px; color: var(--muted); max-width: 560px; margin-bottom: 48px; }
    #contact .section-sub { text-align: center; margin-left: auto; margin-right: auto; }

    /* MISSION */
    #mission { background: var(--bg2); }
    .mission-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
    .mission-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
    .mission-icon { font-size: 28px; margin-bottom: 14px; }
    .mission-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .mission-card p { font-size: 14px; color: var(--muted); }

    /* FEATURES */
    .features-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: stretch; }
    .feature-card { height: 100%; }
    @media (max-width: 800px) { .features-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .features-grid { grid-template-columns: 1fr; } }
    .feature-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; transition: border-color 0.2s; }
    .feature-card:hover { border-color: var(--primary); }
    .feature-icon { font-size: 24px; margin-bottom: 12px; }
    .feature-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .feature-card p { font-size: 14px; color: var(--muted); }

    /* SAFETY */
    #safety { background: var(--bg2); }
    .safety-inner { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    .safety-inner h2 { font-size: 28px; font-weight: 800; margin-bottom: 16px; }
    .safety-inner p { color: var(--muted); margin-bottom: 12px; }
    .safety-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .safety-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 15px; color: var(--muted); }
    .safety-list li span.check { color: var(--primary); flex-shrink: 0; }

    /* CONTACT */
    #contact { text-align: center; }
    .contact-cards { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 40px; }
    .contact-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 32px; min-width: 200px; }
    .contact-card .icon { font-size: 22px; margin-bottom: 10px; }
    .contact-card h4 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .contact-card a { font-size: 14px; font-weight: 500; }

    /* FOOTER */
    footer { background: var(--bg2); border-top: 1px solid var(--border); padding: 40px 24px; text-align: center; }
    .footer-logo { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .footer-tagline { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    .footer-links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
    .footer-links a { font-size: 13px; color: var(--muted); }
    .footer-links a:hover { color: var(--fg); text-decoration: none; }
    .footer-legal { font-size: 12px; color: var(--muted); line-height: 1.9; }
    .footer-legal strong { color: var(--fg); }

    @media (max-width: 680px) {
      .nav-links { display: none; }
      .safety-inner { grid-template-columns: 1fr; padding: 28px; gap: 28px; }
      .safety-emoji { display: none; }
    }
  </style>
</head>

const LANG_LABELS = { en: "EN", pt: "PT", es: "ES", de: "DE", fr: "FR", it: "IT", hu: "HU" };

function detectLang() {
  const saved = localStorage.getItem("bs-lang");
  if (saved && TRANSLATIONS[saved]) return saved;
  const browser = (navigator.language || "en").slice(0, 2).toLowerCase();
  return TRANSLATIONS[browser] ? browser : "en";
}

function applyLang(lang) {
  const t = TRANSLATIONS[lang] || TRANSLATIONS.en;
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key] !== undefined) el.textContent = t[key];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const key = el.getAttribute("data-i18n-html");
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.getElementById("langLabel").textContent = LANG_LABELS[lang] || lang.toUpperCase();
  document.querySelectorAll(".lang-option").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });
  localStorage.setItem("bs-lang", lang);
}

// Dropdown toggle
const langBtn = document.getElementById("langBtn");
const langDropdown = document.getElementById("langDropdown");
langBtn.addEventListener("click", e => { e.stopPropagation(); langDropdown.classList.toggle("open"); });
document.addEventListener("click", () => langDropdown.classList.remove("open"));
document.querySelectorAll(".lang-option").forEach(btn => {
  btn.addEventListener("click", () => { applyLang(btn.dataset.lang); langDropdown.classList.remove("open"); });
});

applyLang(detectLang());
</script>
